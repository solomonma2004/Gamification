<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICB 重新啟動儀表板 - v3.5 API Optimized</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Inter', "Microsoft JhengHei", sans-serif; 
            background-color: #f8fafc; 
            color: #1e293b; 
            -webkit-font-smoothing: antialiased;
        }

        .card { 
            background: white; 
            border-radius: 1.5rem; 
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.04); 
            border: 1px solid #e2e8f0; 
        }

        .status-badge { 
            padding: 0.35rem 0.85rem; 
            border-radius: 9999px; 
            font-size: 0.7rem; 
            font-weight: 800; 
            display: inline-flex; 
            text-transform: uppercase; 
            letter-spacing: 0.05em; 
        }

        .segment-b { background-color: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .segment-c { background-color: #e0f2fe; color: #075985; border: 1px solid #bae6fd; }

        #loginGate { 
            background: #ffffff; 
            z-index: 100; 
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        #loadingOverlay { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(12px); 
            z-index: 90; 
        }

        /* Custom Scrollbar for better UX */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
    </style>
</head>
<body class="min-h-screen">

    <!-- Login Entry Gate -->
    <div id="loginGate" class="fixed inset-0 flex items-center justify-center p-6">
        <div class="max-w-md w-full p-10 space-y-10 bg-white rounded-[3rem] shadow-[0_30px_70px_-15px_rgba(0,0,0,0.12)] border border-slate-50">
            <div class="text-center space-y-5">
                <div class="inline-flex bg-indigo-600 p-6 rounded-[2rem] shadow-2xl shadow-indigo-200">
                    <svg class="h-10 w-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A10.003 10.003 0 0012 20a10.003 10.003 0 006.239-2.227l.046.076M12 11a1 1 0 11-2 0 1 1 0 012 0zm7-3a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
                <h2 class="text-3xl font-black text-slate-900 tracking-tight">治療師數據終端</h2>
                <p id="authStatus" class="text-slate-400 font-medium text-sm">正在從遠端 API 獲取授權...</p>
            </div>

            <form id="loginForm" class="space-y-8">
                <div class="space-y-3">
                    <label class="block text-[10px] font-black text-slate-300 uppercase tracking-[0.3em] ml-2">Authenticator ID</label>
                    <input type="text" id="staffIdInput" required placeholder="Staff ID" class="w-full px-8 py-6 bg-slate-50 border-2 border-transparent rounded-3xl focus:border-indigo-500 focus:bg-white outline-none transition-all font-bold text-4xl text-center tracking-[0.2em] text-slate-700">
                </div>
                <button type="submit" id="loginBtn" class="w-full bg-indigo-600 text-white py-6 rounded-3xl font-bold shadow-2xl shadow-indigo-100 hover:bg-indigo-700 active:scale-[0.97] transition-all text-xl disabled:opacity-30" disabled>
                    正在同步數據...
                </button>
                <div id="loginError" class="p-5 bg-rose-50 border border-rose-100 rounded-3xl text-rose-600 text-[11px] font-bold text-center hidden"></div>
            </form>
            
            <div class="pt-4 border-t border-slate-50 text-center">
                <span class="text-[9px] text-slate-300 font-bold uppercase tracking-widest">v3.5 Remote Web App Mode</span>
            </div>
        </div>
    </div>

    <!-- Data Synchronizing Overlay -->
    <div id="loadingOverlay" class="fixed inset-0 flex flex-col items-center justify-center hidden">
        <div class="animate-spin rounded-full h-16 w-16 border-[5px] border-indigo-50 border-t-indigo-600"></div>
        <p class="mt-8 text-slate-900 font-black tracking-widest text-sm uppercase">正在同步雲端實時紀錄</p>
    </div>

    <!-- Main Dashboard -->
    <div id="dashboardContent" class="hidden flex flex-col min-h-screen">
        <header class="bg-white/80 backdrop-blur-2xl sticky top-0 z-40 border-b border-slate-200/50 px-10 py-5">
            <div class="max-w-[1600px] mx-auto flex items-center justify-between">
                <div class="flex items-center space-x-6">
                    <div class="bg-indigo-600 p-3 rounded-2xl shadow-lg shadow-indigo-100">
                        <svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 8v8m-4-5v5m-4-2v2m-2 4h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-xl font-black text-slate-900 tracking-tight">ICB Reactivation</h1>
                        <p class="text-[10px] text-indigo-600 font-black uppercase tracking-[0.2em]" id="currentUserDisplay">USER: -</p>
                    </div>
                </div>
                <div class="flex items-center space-x-8">
                    <input type="text" id="searchInput" oninput="debounceFilter()" placeholder="快速搜尋會員或中心..." class="px-6 py-3 bg-slate-100 border-none rounded-2xl text-sm w-80 outline-none focus:ring-2 focus:ring-indigo-500 font-bold">
                    <button onclick="logout()" class="text-[10px] font-black text-slate-400 hover:text-rose-500 uppercase tracking-[0.2em] transition-colors">安全登出</button>
                </div>
            </div>
        </header>

        <main class="flex-1 max-w-[1600px] w-full mx-auto px-10 py-10 space-y-8">
            <!-- Key Performance Indicators -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-8">
                <div class="card p-8 flex flex-col justify-between">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">您的總客戶數</span>
                    <span class="text-4xl font-black mt-2 text-slate-800" id="stat-total">0</span>
                </div>
                <div class="card p-8 flex flex-col justify-between">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Segment B</span>
                    <span class="text-4xl font-black mt-2 text-slate-800" id="stat-segB">0</span>
                </div>
                <div class="card p-8 flex flex-col justify-between">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Segment C</span>
                    <span class="text-4xl font-black mt-2 text-slate-800" id="stat-segC">0</span>
                </div>
                <div class="card p-8 flex flex-col justify-between bg-indigo-600 text-white border-none shadow-indigo-200 shadow-2xl">
                    <span class="text-[10px] font-black text-indigo-200 uppercase tracking-widest">名單總價值</span>
                    <span class="text-4xl font-black mt-2" id="stat-value">$0</span>
                </div>
            </div>

            <!-- Data Table Section -->
            <div class="card overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b border-slate-100 text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">
                            <tr>
                                <th class="px-10 py-6">品牌</th>
                                <th class="px-10 py-6">中心</th>
                                <th class="px-10 py-6">會員編號</th>
                                <th class="px-10 py-6">客群分類</th>
                                <th class="px-10 py-6">最後購買</th>
                                <th class="px-10 py-6">最後到訪</th>
                                <th class="px-10 py-6 text-indigo-600">剩餘價值</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-slate-100 font-medium text-slate-600">
                            <!-- Injected by JavaScript -->
                        </tbody>
                    </table>
                </div>
                <div id="noResults" class="hidden p-40 text-center">
                    <div class="bg-slate-50 inline-flex p-8 rounded-[3rem] mb-6">
                        <svg class="w-12 h-12 text-slate-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0a2 2 0 01-2 2H6a2 2 0 01-2-2m16 0l-3.586-3.586a2 2 0 112.828-2.828L20 13zM6 13l3.586-3.586a2 2 0 112.828 2.828L6 13z" />
                        </svg>
                    </div>
                    <p class="text-slate-400 font-black uppercase tracking-widest text-sm">此帳號目前無關聯之真實名單數據</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- API CONFIGURATION ---
        // Your provided Google Apps Script Web App URL
        const BASE_API = 'https://script.google.com/macros/s/AKfycbzDLHTl5tV86XwFzKck6S5iDk7KsOBR7y6nDvP_XjifEliHITyj7J0nXg1jV-El0rC0/exec';
        const API_URL = `${BASE_API}?action=init`;
        
        let staffMapping = {};
        let rawData = [];
        let currentTherapistName = null;
        let searchTimeout = null;

        /**
         * Fetches mapping and sheet data from the GAS backend
         */
        async function initApp() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error("遠端伺服器通訊錯誤");
                
                const result = await response.json();
                
                if (result.error) {
                    showError("API 錯誤: " + result.error);
                    return;
                }

                if (result && result.mapping) {
                    staffMapping = result.mapping;
                    rawData = result.data || [];
                    document.getElementById('authStatus').textContent = "身分驗證系統已就緒";
                    enableLogin();
                } else {
                    showError("資料格式錯誤，請檢查後端部署設定。");
                }
            } catch (err) {
                console.error("Init Error:", err);
                showError("無法連線至雲端資料庫。請確認 Web App 已發布且權限設為 Anyone。");
            }
        }

        function enableLogin() {
            const btn = document.getElementById('loginBtn');
            btn.disabled = false;
            btn.textContent = "進入系統";
            document.getElementById('loginError').classList.add('hidden');
        }

        function showError(msg) {
            const err = document.getElementById('loginError');
            err.textContent = msg;
            err.classList.remove('hidden');
            
            const btn = document.getElementById('loginBtn');
            btn.textContent = "初始化失敗";
            btn.disabled = true;
        }

        // Login Handler
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('staffIdInput').value.trim();
            
            if (staffMapping[id]) {
                currentTherapistName = staffMapping[id];
                
                // Visual Transition
                const gate = document.getElementById('loginGate');
                gate.style.opacity = '0';
                gate.style.transform = 'translateY(-20px) scale(0.98)';
                
                setTimeout(() => {
                    gate.classList.add('hidden');
                    document.getElementById('dashboardContent').classList.remove('hidden');
                    document.getElementById('currentUserDisplay').textContent = `USER: ${currentTherapistName.toUpperCase()}`;
                    applyFiltersAndRender();
                }, 500);
            } else {
                const errorBox = document.getElementById('loginError');
                errorBox.textContent = `驗證失敗：Staff ID "${id}" 尚未在 ID 分頁中登錄。`;
                errorBox.classList.remove('hidden');
            }
        });

        /**
         * Filter raw data based on current therapist and search input
         */
        function applyFiltersAndRender() {
            const search = document.getElementById('searchInput').value.toLowerCase().trim();
            
            // 1. Filter by Logged-in Therapist
            let result = rawData.filter(row => 
                row.therapist && 
                row.therapist.toString().toLowerCase().trim() === currentTherapistName.toLowerCase().trim()
            );

            // 2. Update KPI Stats
            const segBCount = result.filter(r => (r.segment || '').toString().toUpperCase().includes('B')).length;
            const segCCount = result.filter(r => (r.segment || '').toString().toUpperCase().includes('C')).length;
            const totalValue = result.reduce((acc, row) => acc + (parseFloat(row.value) || 0), 0);

            document.getElementById('stat-total').textContent = result.length.toLocaleString();
            document.getElementById('stat-segB').textContent = segBCount.toLocaleString();
            document.getElementById('stat-segC').textContent = segCCount.toLocaleString();
            document.getElementById('stat-value').textContent = `$${totalValue.toLocaleString()}`;

            // 3. Filter by Keyword (Member Code or Center)
            if (search) {
                result = result.filter(row => 
                    (row.code && row.code.toString().toLowerCase().includes(search)) || 
                    (row.center && row.center.toString().toLowerCase().includes(search)) ||
                    (row.brand && row.brand.toString().toLowerCase().includes(search))
                );
            }

            renderTable(result);
        }

        /**
         * Render filtered rows into the table body
         */
        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            if (data.length === 0) {
                document.getElementById('noResults').classList.remove('hidden');
                return;
            }
            
            document.getElementById('noResults').classList.add('hidden');
            
            data.forEach(m => {
                const row = document.createElement('tr');
                row.className = "hover:bg-slate-50 transition text-[13px] border-b border-slate-50";
                
                const segment = (m.segment || '').toString();
                const isB = segment.toUpperCase().includes('B');
                const badgeClass = isB ? 'segment-b' : 'segment-c';
                
                row.innerHTML = `
                    <td class="px-10 py-6 text-slate-400 font-black text-[10px] uppercase">${m.brand || '-'}</td>
                    <td class="px-10 py-6 font-bold text-slate-800">${m.center || '-'}</td>
                    <td class="px-10 py-6 font-black text-indigo-600 tracking-tight">${m.code || '-'}</td>
                    <td class="px-10 py-6"><span class="status-badge ${badgeClass}">${segment}</span></td>
                    <td class="px-10 py-6 text-slate-400">${m.purchase || '-'}</td>
                    <td class="px-10 py-6 text-slate-400">${m.visit || '-'}</td>
                    <td class="px-10 py-6 font-black text-slate-900">$${(parseFloat(m.value) || 0).toLocaleString()}</td>
                `;
                tbody.appendChild(row);
            });
        }

        function logout() { 
            window.location.reload(); 
        }

        function debounceFilter() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(applyFiltersAndRender, 300);
        }

        // Initialize connection to Web App on load
        window.onload = initApp;
    </script>
</body>
</html>
