<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>治療師非活躍客戶數據系統 - v4.8 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
        }

        body { 
            font-family: 'Plus Jakarta Sans', "Microsoft JhengHei", sans-serif; 
            background-color: #fbfcfe; 
            color: #1e293b; 
            -webkit-font-smoothing: antialiased;
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(241, 245, 249, 1);
            border-radius: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        .status-badge { 
            padding: 0.25rem 0.75rem; 
            border-radius: 9999px; 
            font-size: 0.65rem; 
            font-weight: 800; 
            display: inline-flex; 
            text-transform: uppercase; 
            letter-spacing: 0.05em; 
        }

        .segment-b { background-color: #dcfce7; color: #15803d; }
        .segment-c { background-color: #e0f2fe; color: #0369a1; }
        .segment-other { background-color: #f1f5f9; color: #64748b; }

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }

        .table-row-hover:hover {
            background-color: #f8fafc;
            cursor: pointer;
        }

        th.sortable { cursor: pointer; user-select: none; transition: background 0.2s; }
        th.sortable:hover { background: #f1f5f9; color: var(--primary); }

        .filter-input {
            @apply px-3 py-2 bg-white border border-slate-200 rounded-lg text-xs outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all font-semibold;
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Login Section -->
    <div id="loginGate" class="fixed inset-0 flex items-center justify-center p-6 bg-[#f8fafc] z-[100] transition-all duration-700">
        <div class="max-w-md w-full p-10 space-y-8 bg-white rounded-[2.5rem] shadow-[0_32px_64px_-12px_rgba(0,0,0,0.08)] border border-slate-100 animate-in">
            <div class="text-center space-y-4">
                <div class="inline-flex bg-indigo-600 p-5 rounded-3xl shadow-xl shadow-indigo-100">
                    <i data-lucide="shield-check" class="w-8 h-8 text-white"></i>
                </div>
                <div>
                    <h2 class="text-2xl font-extrabold text-slate-900">非活躍客戶系統</h2>
                    <p id="authStatus" class="text-slate-400 font-medium text-sm mt-1">請輸入 Staff ID 驗證權限</p>
                </div>
            </div>

            <form id="loginForm" class="space-y-6">
                <div class="space-y-2">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Staff Identifier</label>
                    <input type="text" id="staffIdInput" autocomplete="off" required placeholder="E.g. T12345" 
                        class="w-full px-6 py-5 bg-slate-50 border-2 border-transparent rounded-2xl focus:border-indigo-500 focus:bg-white outline-none transition-all font-bold text-2xl text-center uppercase tracking-widest text-slate-700">
                </div>
                
                <button type="submit" id="loginBtn" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-bold shadow-lg shadow-indigo-100 hover:bg-indigo-700 active:scale-[0.98] transition-all flex items-center justify-center space-x-2">
                    <span>進入儀表板</span>
                    <i data-lucide="arrow-right" class="w-5 h-5"></i>
                </button>
                
                <div id="loginError" class="p-4 bg-rose-50 border border-rose-100 rounded-xl text-rose-600 text-xs font-bold text-center hidden animate-in"></div>
            </form>
            
            <div class="pt-6 border-t border-slate-50 text-center">
                <span class="text-[9px] text-slate-300 font-bold uppercase tracking-[0.3em]">v4.8 PRO • Integer Value Mode</span>
            </div>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="dashboardContent" class="hidden flex flex-col min-h-screen bg-[#fbfcfe]">
        <header class="bg-white/80 backdrop-blur-xl sticky top-0 z-40 border-b border-slate-100 px-6 py-4">
            <div class="max-w-[1600px] mx-auto flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <div class="bg-indigo-600 p-2.5 rounded-xl">
                        <i data-lucide="activity" class="w-5 h-5 text-white"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-extrabold text-slate-900 leading-tight">ICB Reactivation</h1>
                        <div class="flex items-center space-x-2">
                            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                            <p class="text-[10px] text-indigo-600 font-bold uppercase tracking-widest" id="currentUserDisplay">USER: -</p>
                        </div>
                    </div>
                </div>
                
                <div class="flex items-center space-x-4">
                    <div class="relative group hidden md:block">
                        <i data-lucide="search" class="w-4 h-4 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-indigo-500 transition-colors"></i>
                        <input type="text" id="searchInput" oninput="debounceFilter()" placeholder="搜尋編號、中心或品牌..." 
                            class="pl-11 pr-6 py-2.5 bg-slate-100 border-none rounded-xl text-sm w-64 outline-none focus:ring-2 focus:ring-indigo-500/20 focus:bg-white font-medium transition-all">
                    </div>
                    <button onclick="toggleFilters()" class="p-2.5 bg-white border border-slate-200 rounded-xl text-slate-600 hover:text-indigo-600 hover:border-indigo-200 transition-all shadow-sm flex items-center space-x-2" id="filterToggle">
                        <i data-lucide="sliders-horizontal" class="w-5 h-5"></i>
                        <span class="text-xs font-bold hidden md:block">進階篩選</span>
                    </button>
                    <button onclick="exportToCSV()" class="p-2.5 bg-white border border-slate-200 rounded-xl text-slate-600 hover:text-indigo-600 hover:border-indigo-200 transition-all shadow-sm" title="匯出 CSV">
                        <i data-lucide="download" class="w-5 h-5"></i>
                    </button>
                    <button onclick="logout()" class="p-2.5 bg-rose-50 text-rose-600 rounded-xl hover:bg-rose-100 transition-all shadow-sm shadow-rose-100" title="登出">
                        <i data-lucide="log-out" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </header>

        <main class="flex-1 max-w-[1600px] w-full mx-auto px-6 py-8 space-y-6">
            
            <!-- Advanced Filters Panel -->
            <div id="filtersPanel" class="hidden glass-card p-6 animate-in border-indigo-100 bg-indigo-50/10">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div class="space-y-3">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center">
                            <i data-lucide="dollar-sign" class="w-3 h-3 mr-1"></i> 餘下療程價值範圍
                        </label>
                        <div class="flex items-center space-x-2">
                            <input type="number" id="filterValueMin" oninput="debounceFilter()" placeholder="Min $" class="filter-input w-full">
                            <span class="text-slate-300">~</span>
                            <input type="number" id="filterValueMax" oninput="debounceFilter()" placeholder="Max $" class="filter-input w-full">
                        </div>
                    </div>
                    <div class="space-y-3">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center">
                            <i data-lucide="calendar" class="w-3 h-3 mr-1"></i> 對上一次到店日期
                        </label>
                        <div class="flex items-center space-x-2">
                            <input type="date" id="filterVisitStart" onchange="debounceFilter()" class="filter-input w-full">
                            <span class="text-slate-300">至</span>
                            <input type="date" id="filterVisitEnd" onchange="debounceFilter()" class="filter-input w-full">
                        </div>
                    </div>
                    <div class="space-y-3">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center">
                            <i data-lucide="shopping-bag" class="w-3 h-3 mr-1"></i> 對上一次購買日期
                        </label>
                        <div class="flex items-center space-x-2">
                            <input type="date" id="filterPurchaseStart" onchange="debounceFilter()" class="filter-input w-full">
                            <span class="text-slate-300">至</span>
                            <input type="date" id="filterPurchaseEnd" onchange="debounceFilter()" class="filter-input w-full">
                        </div>
                    </div>
                </div>
                <div class="mt-6 flex justify-end">
                    <button onclick="resetFilters()" class="text-[10px] font-bold text-indigo-600 hover:text-indigo-800 uppercase tracking-widest">清除所有篩選條件</button>
                </div>
            </div>

            <!-- Stats -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6">
                <div class="glass-card p-6 flex flex-col justify-between overflow-hidden relative group">
                    <div class="relative z-10">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">符合條件之客戶</span>
                        <div class="text-3xl font-extrabold mt-1 text-slate-900" id="stat-total">0</div>
                    </div>
                    <i data-lucide="users" class="w-12 h-12 absolute -right-2 -bottom-2 text-slate-50 group-hover:text-indigo-50 transition-colors"></i>
                </div>
                <div class="glass-card p-6 flex flex-col justify-between overflow-hidden relative group">
                    <div class="relative z-10">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Segment B</span>
                        <div class="text-3xl font-extrabold mt-1 text-green-600" id="stat-segB">0</div>
                    </div>
                    <i data-lucide="trending-up" class="w-12 h-12 absolute -right-2 -bottom-2 text-slate-50 group-hover:text-green-50 transition-colors"></i>
                </div>
                <div class="glass-card p-6 flex flex-col justify-between overflow-hidden relative group">
                    <div class="relative z-10">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Segment C</span>
                        <div class="text-3xl font-extrabold mt-1 text-blue-600" id="stat-segC">0</div>
                    </div>
                    <i data-lucide="pie-chart" class="w-12 h-12 absolute -right-2 -bottom-2 text-slate-50 group-hover:text-blue-50 transition-colors"></i>
                </div>
                <div class="glass-card p-6 flex flex-col justify-between bg-indigo-600 border-none shadow-xl shadow-indigo-100 overflow-hidden relative group">
                    <div class="relative z-10">
                        <span class="text-[10px] font-bold text-indigo-100 uppercase tracking-widest">餘下療程總價值</span>
                        <div class="text-3xl font-extrabold mt-1 text-white" id="stat-value">$0</div>
                    </div>
                    <i data-lucide="sparkles" class="w-12 h-12 absolute -right-2 -bottom-2 text-indigo-500/20 group-hover:text-indigo-400/20 transition-colors"></i>
                </div>
            </div>

            <!-- Table -->
            <div class="glass-card overflow-hidden">
                <div class="overflow-x-auto min-h-[400px]">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50/50 border-b border-slate-100 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                                <th class="px-6 py-5 sortable" onclick="handleSort('brand')">品牌 <i data-lucide="chevron-down" class="inline w-3 h-3 ml-1 opacity-0 sort-icon" id="sort-brand"></i></th>
                                <th class="px-6 py-5 sortable" onclick="handleSort('center')">中心 <i data-lucide="chevron-down" class="inline w-3 h-3 ml-1 opacity-0 sort-icon" id="sort-center"></i></th>
                                <th class="px-6 py-5 sortable" onclick="handleSort('code')">會員編號 <i data-lucide="chevron-down" class="inline w-3 h-3 ml-1 opacity-0 sort-icon" id="sort-code"></i></th>
                                <th class="px-6 py-5 sortable" onclick="handleSort('segment')">分類 <i data-lucide="chevron-down" class="inline w-3 h-3 ml-1 opacity-0 sort-icon" id="sort-segment"></i></th>
                                <th class="px-6 py-5 sortable" onclick="handleSort('visit')">到店日期 <i data-lucide="chevron-down" class="inline w-3 h-3 ml-1 opacity-0 sort-icon" id="sort-visit"></i></th>
                                <th class="px-6 py-5 sortable" onclick="handleSort('purchase')">購買日期 <i data-lucide="chevron-down" class="inline w-3 h-3 ml-1 opacity-0 sort-icon" id="sort-purchase"></i></th>
                                <th class="px-6 py-5 sortable" onclick="handleSort('value')">餘下價值 <i data-lucide="chevron-down" class="inline w-3 h-3 ml-1 opacity-0 sort-icon" id="sort-value"></i></th>
                                <th class="px-6 py-5 text-center sortable" onclick="handleSort('swapEligible')">可轉 <i data-lucide="chevron-down" class="inline w-3 h-3 ml-1 opacity-0 sort-icon" id="sort-swapEligible"></i></th>
                                <th class="px-6 py-5 text-center sortable" onclick="handleSort('swapped')">換領 <i data-lucide="chevron-down" class="inline w-3 h-3 ml-1 opacity-0 sort-icon" id="sort-swapped"></i></th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-slate-100">
                            <!-- JS Injected -->
                        </tbody>
                    </table>
                </div>
                
                <!-- No Results -->
                <div id="noResults" class="hidden py-32 text-center bg-slate-50/20">
                    <div class="inline-flex p-6 rounded-full bg-white shadow-sm border border-slate-100 mb-4">
                        <i data-lucide="search-x" class="w-10 h-10 text-slate-300"></i>
                    </div>
                    <p class="text-slate-400 font-bold uppercase tracking-widest text-xs" id="noResultsText">查無符合條件之數據紀錄</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Client Detail Modal -->
    <div id="clientModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm hidden opacity-0 transition-all duration-300">
        <div class="bg-white rounded-3xl w-full max-w-xl overflow-hidden shadow-2xl transform scale-95 transition-transform duration-300" id="modalContainer">
            <div class="px-8 py-6 bg-indigo-600 text-white flex justify-between items-center">
                <div>
                    <h3 class="text-xl font-extrabold" id="modalClientCode">---</h3>
                    <p class="text-indigo-100 text-[10px] font-bold uppercase tracking-widest" id="modalClientCenter">---</p>
                </div>
                <button onclick="closeModal()" class="p-2 hover:bg-white/10 rounded-full transition-colors">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <div class="p-8 space-y-6 max-h-[70vh] overflow-y-auto" id="modalBody">
                <!-- Content injected here -->
            </div>
            <div class="p-6 bg-slate-50 border-t border-slate-100 flex justify-end">
                <button onclick="closeModal()" class="px-6 py-2.5 bg-white border border-slate-200 rounded-xl font-bold text-slate-600 hover:bg-slate-100 transition-all">關閉視窗</button>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIG ---
        const API_URL = 'https://script.google.com/macros/s/AKfycbzDLHTl5tV86XwFzKck6S5iDk7KsOBR7y6nDvP_XjifEliHITyj7J0nXg1jV-El0rC0/exec?action=init';
        
        const BRAND_SWAP_RULES = {
            'dermes': ['CPS', 'BBL Body', 'BBL Face'],
            'elyze': ['Cool', 'RF', 'BBL Face'],
            'reenex': ['Aramis', 'BBL Face']
        };

        const DISPLAY_LABELS = {
            'segment': '客群分類',
            'purchase': '對上一次購買日期',
            'visit': '對上一次到店日期',
            'value': '餘下療程價值',
            'swapped': '已經成功換領新療程'
        };

        let staffMapping = {};
        let rawData = [];
        let filteredData = [];
        let currentTherapistName = null;
        let searchTimeout = null;
        let currentSort = { key: 'default_ranking', direction: 'desc' };

        function initIcons() { lucide.createIcons(); }

        // --- AUTH & DATA ---
        async function authenticate(staffId) {
            const btn = document.getElementById('loginBtn');
            const errBox = document.getElementById('loginError');
            btn.disabled = true;
            btn.innerHTML = `<span class="animate-spin mr-2 inline-block">◌</span> 正在獲取雲端授權...`;
            errBox.classList.add('hidden');

            try {
                const response = await fetch(API_URL, { method: 'GET', mode: 'cors', redirect: 'follow' });
                if (!response.ok) throw new Error("通訊失敗 (" + response.status + ")");
                const result = await response.json();
                if (result.error) throw new Error(result.error);

                staffMapping = result.mapping || {};
                rawData = result.data || [];

                if (staffMapping[staffId]) {
                    currentTherapistName = staffMapping[staffId];
                    localStorage.setItem('icb_staff_id', staffId);
                    enterDashboard();
                } else {
                    throw new Error(`身分驗證失敗：Staff ID [${staffId}] 不在授權名單中。`);
                }
            } catch (err) {
                errBox.textContent = err.message;
                errBox.classList.remove('hidden');
                btn.disabled = false;
                btn.innerHTML = `<span>進入儀表板</span> <i data-lucide="arrow-right" class="w-5 h-5 ml-2"></i>`;
                initIcons();
            }
        }

        function enterDashboard() {
            const gate = document.getElementById('loginGate');
            gate.style.opacity = '0';
            gate.style.pointerEvents = 'none';
            setTimeout(() => {
                gate.classList.add('hidden');
                document.getElementById('dashboardContent').classList.remove('hidden');
                document.getElementById('currentUserDisplay').textContent = `USER: ${currentTherapistName.toUpperCase()}`;
                processAndRender();
                updateSortIndicator();
                initIcons();
            }, 600);
        }

        // --- DATA ENGINE ---
        function getFuzzyVal(obj, exactKey) {
            if (!obj) return '-';
            if (obj[exactKey] !== undefined) return obj[exactKey];
            
            const normalize = (s) => s.toString().toLowerCase().trim()
                .replace(/[\s\-_]/g, '')
                .replace('forswap', '')
                .replace('outstandingtxvalue', 'value')
                .replace('swapalready', 'swapped');
            
            const target = normalize(exactKey);
            const foundKey = Object.keys(obj).find(k => {
                const nk = normalize(k);
                return nk === target || nk.includes(target) || target.includes(nk);
            });
            return foundKey ? obj[foundKey] : '-';
        }

        function isValuePositive(val) {
            const s = (val || '').toString().toUpperCase();
            return ['Y', 'YES', '1', 'TRUE', '✓'].includes(s);
        }

        function checkSwapEligibility(client) {
            const b = (getFuzzyVal(client, 'brand') || '').toString().toLowerCase();
            let brandKey = 'other';
            if (b.includes('dermes')) brandKey = 'dermes';
            else if (b.includes('elyze')) brandKey = 'elyze';
            else if (b.includes('reenex')) brandKey = 'reenex';

            const rules = BRAND_SWAP_RULES[brandKey] || [];
            const eligibleTreatments = [];
            rules.forEach(treatment => {
                if (isValuePositive(getFuzzyVal(client, treatment))) eligibleTreatments.push(treatment);
            });
            return { eligible: eligibleTreatments.length > 0, techs: eligibleTreatments };
        }

        function parseDate(dateStr) {
            if (!dateStr || dateStr === '-') return null;
            const d = new Date(dateStr);
            return isNaN(d.getTime()) ? null : d;
        }

        function processAndRender() {
            const search = document.getElementById('searchInput').value.toLowerCase().trim();
            const valMin = parseFloat(document.getElementById('filterValueMin').value) || -Infinity;
            const valMax = parseFloat(document.getElementById('filterValueMax').value) || Infinity;
            const visitStart = parseDate(document.getElementById('filterVisitStart').value);
            const visitEnd = parseDate(document.getElementById('filterVisitEnd').value);
            const purchaseStart = parseDate(document.getElementById('filterPurchaseStart').value);
            const purchaseEnd = parseDate(document.getElementById('filterPurchaseEnd').value);

            let result = rawData.filter(row => {
                const t = (getFuzzyVal(row, 'therapist') || getFuzzyVal(row, 'staff') || getFuzzyVal(row, '治療師')).toString().toLowerCase();
                return t === currentTherapistName.toLowerCase();
            });

            result = result.filter(row => {
                const val = parseFloat(getFuzzyVal(row, 'value')) || 0;
                const visitDate = parseDate(getFuzzyVal(row, 'visit'));
                const purchaseDate = parseDate(getFuzzyVal(row, 'purchase'));
                const matchVal = val >= valMin && val <= valMax;
                const matchVisit = (!visitStart || (visitDate && visitDate >= visitStart)) && (!visitEnd || (visitDate && visitDate <= visitEnd));
                const matchPurchase = (!purchaseStart || (purchaseDate && purchaseDate >= purchaseStart)) && (!purchaseEnd || (purchaseDate && purchaseDate <= purchaseEnd));
                return matchVal && matchVisit && matchPurchase;
            });

            if (search) {
                result = result.filter(row => Object.values(row).some(v => v && v.toString().toLowerCase().includes(search)));
            }

            const totalVal = result.reduce((acc, r) => acc + (parseFloat(getFuzzyVal(r, 'value')) || 0), 0);
            document.getElementById('stat-total').textContent = result.length.toLocaleString();
            document.getElementById('stat-segB').textContent = result.filter(r => (getFuzzyVal(r, 'segment') || '').toString().toUpperCase().includes('B')).length.toLocaleString();
            document.getElementById('stat-segC').textContent = result.filter(r => (getFuzzyVal(r, 'segment') || '').toString().toUpperCase().includes('C')).length.toLocaleString();
            // Integer Mode for Stats
            document.getElementById('stat-value').textContent = `$${Math.round(totalVal).toLocaleString()}`;

            // --- SORTING LOGIC ---
            result.sort((a, b) => {
                const isDefault = currentSort.key === 'default_ranking';
                const eliA = checkSwapEligibility(a).eligible;
                const eliB = checkSwapEligibility(b).eligible;

                if (isDefault) {
                    if (eliA !== eliB) return eliB ? 1 : -1;
                    const vA = parseFloat(getFuzzyVal(a, 'value')) || 0;
                    const vB = parseFloat(getFuzzyVal(b, 'value')) || 0;
                    return vB - vA;
                }

                let v1, v2;
                if (currentSort.key === 'swapEligible') {
                    v1 = eliA; v2 = eliB;
                } else if (currentSort.key === 'swapped') {
                    v1 = isValuePositive(getFuzzyVal(a, 'swapped'));
                    v2 = isValuePositive(getFuzzyVal(b, 'swapped'));
                } else if (currentSort.key === 'value') {
                    v1 = parseFloat(getFuzzyVal(a, 'value')) || 0;
                    v2 = parseFloat(getFuzzyVal(b, 'value')) || 0;
                } else if (['visit', 'purchase'].includes(currentSort.key)) {
                    const d1 = parseDate(getFuzzyVal(a, currentSort.key));
                    const d2 = parseDate(getFuzzyVal(b, currentSort.key));
                    v1 = d1 ? d1.getTime() : 0;
                    v2 = d2 ? d2.getTime() : 0;
                } else {
                    v1 = getFuzzyVal(a, currentSort.key).toString().toLowerCase();
                    v2 = getFuzzyVal(b, currentSort.key).toString().toLowerCase();
                }

                if (v1 < v2) return currentSort.direction === 'asc' ? -1 : 1;
                if (v1 > v2) return currentSort.direction === 'asc' ? 1 : -1;
                return 0;
            });

            filteredData = result;
            renderTable(result);
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            const noRes = document.getElementById('noResults');
            tbody.innerHTML = '';
            if (data.length === 0) { noRes.classList.remove('hidden'); return; }
            noRes.classList.add('hidden');

            data.forEach(m => {
                const seg = (getFuzzyVal(m, 'segment') || 'N/A').toString().toUpperCase();
                const badge = seg.includes('B') ? 'segment-b' : (seg.includes('C') ? 'segment-c' : 'segment-other');
                const swap = checkSwapEligibility(m);
                const done = isValuePositive(getFuzzyVal(m, 'swapped'));
                const valRaw = parseFloat(getFuzzyVal(m, 'value')) || 0;

                const row = document.createElement('tr');
                row.className = "table-row-hover transition-all animate-in group text-xs";
                row.onclick = () => showDetails(m);
                row.innerHTML = `
                    <td class="px-6 py-4 font-bold text-slate-400 text-[10px] uppercase">${getFuzzyVal(m, 'brand')}</td>
                    <td class="px-6 py-4 font-medium text-slate-600">${getFuzzyVal(m, 'center')}</td>
                    <td class="px-6 py-4 font-extrabold text-indigo-600">${getFuzzyVal(m, 'code')}</td>
                    <td class="px-6 py-4"><span class="status-badge ${badge}">${seg}</span></td>
                    <td class="px-6 py-4 font-medium text-slate-500">${getFuzzyVal(m, 'visit')}</td>
                    <td class="px-6 py-4 font-medium text-slate-500">${getFuzzyVal(m, 'purchase')}</td>
                    <td class="px-6 py-4 font-bold text-slate-900">$${Math.round(valRaw).toLocaleString()}</td>
                    <td class="px-6 py-4 text-center">
                        <span class="${swap.eligible ? 'text-green-500' : 'text-slate-200'}">
                            <i data-lucide="${swap.eligible ? 'sparkles' : 'circle'}" class="w-4 h-4 mx-auto"></i>
                        </span>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <span class="${done ? 'text-indigo-600' : 'text-slate-200'}">
                            <i data-lucide="${done ? 'check-circle-2' : 'circle'}" class="w-4 h-4 mx-auto"></i>
                        </span>
                    </td>
                `;
                tbody.appendChild(row);
            });
            initIcons();
        }

        // --- MODAL ---
        function showDetails(client) {
            document.getElementById('modalClientCode').textContent = getFuzzyVal(client, 'code');
            document.getElementById('modalClientCenter').textContent = `${getFuzzyVal(client, 'brand')} - ${getFuzzyVal(client, 'center')}`;
            const swapInfo = checkSwapEligibility(client);
            const isSwapped = isValuePositive(getFuzzyVal(client, 'swapped'));
            const b = (getFuzzyVal(client, 'brand') || '').toString().toLowerCase();
            const brandKey = b.includes('dermes') ? 'DERMES' : (b.includes('elyze') ? 'ELYZE' : (b.includes('reenex') ? 'REENEX' : 'OTHER'));
            const body = document.getElementById('modalBody');
            body.innerHTML = '';

            const banner = document.createElement('div');
            banner.className = `p-6 rounded-2xl mb-8 flex items-center justify-between ${swapInfo.eligible ? 'bg-green-50 border border-green-100' : 'bg-slate-50 border border-slate-100'}`;
            banner.innerHTML = `
                <div class="flex items-center space-x-4">
                    <div class="p-3 rounded-xl ${swapInfo.eligible ? 'bg-green-500' : 'bg-slate-300'}">
                        <i data-lucide="${swapInfo.eligible ? 'zap' : 'slash'}" class="w-6 h-6 text-white"></i>
                    </div>
                    <div>
                        <h4 class="font-extrabold text-slate-800 tracking-tight">${swapInfo.eligible ? '符合轉新療程資格' : '未達轉療程門檻'}</h4>
                        <p class="text-xs text-slate-500">${swapInfo.eligible ? '可換取 Hot Low Plasma 療程' : '此客戶目前無可換領之舊有療程'}</p>
                    </div>
                </div>
                ${isSwapped ? `<span class="bg-indigo-600 text-white text-[10px] font-black px-3 py-1 rounded-full shadow-sm">已換領</span>` : ''}
            `;
            body.appendChild(banner);

            const coreGroup = document.createElement('div');
            coreGroup.innerHTML = `<h4 class="text-[10px] font-black text-slate-300 uppercase tracking-[0.2em] mb-4">帳戶數據</h4>`;
            const coreGrid = document.createElement('div');
            coreGrid.className = "grid grid-cols-2 gap-4 mb-8";
            ['segment', 'purchase', 'visit', 'value'].forEach(k => {
                const val = getFuzzyVal(client, k);
                const item = document.createElement('div');
                item.className = "p-4 bg-slate-50 border border-slate-100 rounded-2xl";
                
                let displayValue = val;
                if (k === 'value') {
                    displayValue = '$' + Math.round(parseFloat(val) || 0).toLocaleString();
                }

                item.innerHTML = `
                    <p class="text-[9px] font-bold text-slate-400 uppercase mb-1">${DISPLAY_LABELS[k]}</p>
                    <p class="font-extrabold text-slate-700">${displayValue}</p>
                `;
                coreGrid.appendChild(item);
            });
            coreGroup.appendChild(coreGrid);
            body.appendChild(coreGroup);

            const techGroup = document.createElement('div');
            techGroup.innerHTML = `<h4 class="text-[10px] font-black text-slate-300 uppercase tracking-[0.2em] mb-4">可轉出之療程 (${brandKey})</h4>`;
            const techGrid = document.createElement('div');
            techGrid.className = "grid grid-cols-1 gap-3";
            const techs = BRAND_SWAP_RULES[brandKey.toLowerCase()] || [];
            techs.forEach(t => {
                const val = getFuzzyVal(client, t);
                const active = swapInfo.techs.includes(t);
                const item = document.createElement('div');
                item.className = `flex items-center justify-between p-4 rounded-2xl border transition-all ${active ? 'bg-indigo-50 border-indigo-200' : 'bg-white border-slate-100 opacity-60'}`;
                item.innerHTML = `
                    <div class="flex items-center space-x-3">
                        <i data-lucide="${active ? 'check-circle-2' : 'circle'}" class="w-5 h-5 ${active ? 'text-indigo-600' : 'text-slate-300'}"></i>
                        <span class="font-bold ${active ? 'text-indigo-900' : 'text-slate-400'}">${t}</span>
                    </div>
                    <span class="font-black ${active ? 'text-indigo-600' : 'text-slate-300'}">${val}</span>
                `;
                techGrid.appendChild(item);
            });
            techGroup.appendChild(techGrid);
            body.appendChild(techGroup);

            const modal = document.getElementById('clientModal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.add('opacity-100');
                document.getElementById('modalContainer').classList.remove('scale-95');
                document.getElementById('modalContainer').classList.add('scale-100');
            }, 10);
            initIcons();
        }

        function closeModal() {
            const modal = document.getElementById('clientModal');
            modal.classList.remove('opacity-100');
            document.getElementById('modalContainer').classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        // --- UI CONTROLS ---
        function toggleFilters() {
            const panel = document.getElementById('filtersPanel');
            panel.classList.toggle('hidden');
            document.getElementById('filterToggle').classList.toggle('bg-indigo-50');
            document.getElementById('filterToggle').classList.toggle('border-indigo-200');
        }

        function resetFilters() {
            ['filterValueMin', 'filterValueMax', 'filterVisitStart', 'filterVisitEnd', 'filterPurchaseStart', 'filterPurchaseEnd'].forEach(id => {
                document.getElementById(id).value = '';
            });
            processAndRender();
        }

        function handleSort(key) {
            if (currentSort.key === key) currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
            else { currentSort.key = key; currentSort.direction = 'desc'; }
            updateSortIndicator();
            processAndRender();
        }

        function updateSortIndicator() {
            document.querySelectorAll('.sort-icon').forEach(i => i.classList.add('opacity-0'));
            const icon = document.getElementById(`sort-${currentSort.key}`);
            if (icon) {
                icon.classList.remove('opacity-0');
                icon.style.transform = currentSort.direction === 'asc' ? 'rotate(180deg)' : 'rotate(0deg)';
            }
        }

        function debounceFilter() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(processAndRender, 300);
        }

        function exportToCSV() {
            if (filteredData.length === 0) return;
            const headers = Object.keys(rawData[0]);
            const csvRows = [headers.join(',')];
            filteredData.forEach(row => {
                const values = headers.map(h => `"${(row[h] || '').toString().replace(/"/g, '""')}"`);
                csvRows.push(values.join(','));
            });
            const blob = new Blob(["\ufeff" + csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Inactive_Clients_${currentTherapistName}.csv`;
            link.click();
        }

        function logout() { localStorage.removeItem('icb_staff_id'); window.location.reload(); }

        window.onload = () => {
            initIcons();
            const saved = localStorage.getItem('icb_staff_id');
            if (saved) document.getElementById('staffIdInput').value = saved;
        };

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const id = document.getElementById('staffIdInput').value.trim().toUpperCase();
            if (id) authenticate(id);
        });
    </script>
</body>
</html>
