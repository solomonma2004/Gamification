<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上海直播膠原少女節實時數據 | 雙模數據看板</title>
    <script src="https://cdn.tailwindcss.com/"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .festival-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        
        /* 試算表風格捲軸 */
        .table-container::-webkit-scrollbar { width: 8px; height: 8px; }
        .table-container::-webkit-scrollbar-track { background: #f8fafc; }
        .table-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .table-container::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* 固定首列效果 */
        .sticky-col { position: sticky; left: 0; z-index: 10; background-color: white; border-right: 2px solid #f1f5f9; }
        tr:hover .sticky-col { background-color: #f8fafc; }
        th.sticky-col { background-color: #0f172a !important; }

        /* 切換開關樣式 */
        .toggle-checkbox:checked + .toggle-label { background-color: #6366f1; }
        .toggle-checkbox:checked { transform: translateX(100%); border-color: #6366f1; }
        
        .status-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .6; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen text-left">

    <div class="max-w-[1600px] mx-auto px-4 py-6">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-6">
            <div class="flex-1">
                <div class="flex items-center gap-4">
                    <div class="p-2 festival-gradient rounded-xl text-white shadow-lg text-left">
                        <i data-lucide="layout-dashboard" size="24"></i>
                    </div>
                    <div class="text-left">
                        <h1 class="text-2xl font-black tracking-tight text-left">上海直播：膠原少女節 <span class="text-slate-300 font-light mx-1">|</span> <span class="text-indigo-600">數據看板</span></h1>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-0.5 text-left">數據來源: real time (SH) <span class="mx-2">•</span> 最後更新: <span id="lastSync">尚未同步</span></p>
                    </div>
                </div>

                <!-- View Switcher -->
                <div class="flex items-center gap-3 bg-white px-4 py-1.5 rounded-full border border-slate-200 shadow-sm mt-4 inline-flex">
                    <span class="text-[10px] font-black text-slate-400 uppercase">表格</span>
                    <div class="relative inline-block w-10 h-5 align-middle select-none transition duration-200 ease-in">
                        <input type="checkbox" name="toggle" id="viewToggle" onchange="renderDashboard()" class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-2 border-slate-300 appearance-none cursor-pointer transition-transform duration-200 ease-in-out z-10" checked/>
                        <label for="viewToggle" class="toggle-label block overflow-hidden h-5 rounded-full bg-slate-200 cursor-pointer transition-colors duration-200"></label>
                    </div>
                    <span class="text-[10px] font-black text-slate-400 uppercase">卡片</span>
                </div>
            </div>
            
            <button onclick="fetchData()" id="refreshBtn" class="flex items-center gap-2 bg-slate-900 text-white px-5 py-3 rounded-xl font-bold text-sm hover:bg-slate-800 transition-all active:scale-95 shadow-lg shadow-slate-200">
                <i data-lucide="refresh-cw" size="14" id="refreshIcon"></i> 
                同步最新數據
            </button>
        </header>

        <!-- Filters -->
        <div class="mb-6 bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-wrap gap-4 items-end">
            <div class="flex-1 min-w-[200px] text-left">
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-1 ml-1 text-left">渠道過濾</label>
                <select id="centerFilter" onchange="onFilterChange()" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 text-sm font-bold outline-none focus:ring-2 focus:ring-indigo-500 transition-all cursor-pointer">
                    <option value="All">所有渠道</option>
                </select>
            </div>
            <div class="flex-1 min-w-[200px] text-left">
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-1 ml-1 text-left">專員搜尋</label>
                <select id="therapistFilter" onchange="onFilterChange()" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 text-sm font-bold outline-none focus:ring-2 focus:ring-indigo-500 transition-all cursor-pointer">
                    <option value="All">所有專員</option>
                </select>
            </div>
            <div class="bg-indigo-50 px-4 py-2 rounded-xl border border-indigo-100 min-w-[120px] text-center">
                <p class="text-[10px] font-black text-indigo-400 uppercase leading-none mb-1 text-center">顯示人數</p>
                <p class="text-lg font-black text-indigo-600 leading-none text-center" id="resultCount">0</p>
            </div>
        </div>

        <!-- Status -->
        <div id="statusContainer" class="hidden">
            <div id="loadingState" class="flex flex-col items-center justify-center py-20 bg-white rounded-3xl border border-slate-100 shadow-sm mb-6">
                <div class="w-12 h-12 border-4 border-indigo-100 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
                <p class="font-bold text-slate-500 text-center">正在加載試算表數據...</p>
            </div>
            <div id="errorState" class="hidden flex flex-col items-center justify-center py-10 text-center bg-red-50 rounded-3xl border border-red-100 mb-6 px-4">
                <i data-lucide="alert-circle" size="32" class="text-red-500 mb-3 mx-auto"></i>
                <h2 class="font-black text-slate-800 text-center">數據同步失敗</h2>
                <p id="errorMsg" class="text-sm text-red-600 font-medium mb-4 text-center"></p>
                <button onclick="fetchData()" class="px-8 py-2.5 bg-red-600 text-white rounded-xl font-bold mx-auto block">重試</button>
            </div>
        </div>

        <!-- Dashboard Content -->
        <div id="dashboardContent" class="transition-all duration-500 pb-20"></div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxC6PYndEA0oc4FBhmOtBZ__OozeVHkOhkWq7kq3aUt7ONL6-epytGAgTYN6zGozvX43w/exec"; 
        
        let allData = [];
        let selectedCenter = 'All';
        let selectedTherapist = 'All';

        function safeCreateIcons() {
            if (typeof lucide !== 'undefined' && lucide.createIcons) {
                lucide.createIcons();
            }
        }

        function cleanVal(val) {
            if (val === null || val === undefined) return 0;
            if (typeof val === 'number') return val;
            const str = String(val).replace(/[$,%]/g, '').replace(/,/g, '').trim();
            if (str === "" || isNaN(str)) return 0;
            return parseFloat(str);
        }

        function findKey(obj, target) {
            if (!obj) return null;
            const normalizedTarget = target.toLowerCase().replace(/\s/g, '');
            const key = Object.keys(obj).find(k => {
                const cleanK = k.toLowerCase().replace(/\s/g, '');
                return cleanK.includes(normalizedTarget) || normalizedTarget.includes(cleanK);
            });
            return key ? obj[key] : null;
        }

        async function fetchData() {
            const statusContainer = document.getElementById('statusContainer');
            const loadingState = document.getElementById('loadingState');
            const errorState = document.getElementById('errorState');
            const refreshIcon = document.getElementById('refreshIcon');
            const dashboardContent = document.getElementById('dashboardContent');

            try {
                statusContainer.classList.remove('hidden');
                loadingState.classList.remove('hidden');
                errorState.classList.add('hidden');
                dashboardContent.classList.add('opacity-30', 'pointer-events-none');
                refreshIcon.classList.add('animate-spin');

                const response = await fetch(`${WEB_APP_URL}?t=${Date.now()}`);
                if (!response.ok) throw new Error(`HTTP 錯誤: ${response.status}`);
                
                const jsonData = await response.json();
                if (jsonData.error) throw new Error(jsonData.error);
                
                const dataToProcess = Array.isArray(jsonData) ? jsonData : (jsonData.data || []);
                if (dataToProcess.length === 0) throw new Error("試算表中無數據。");

                allData = dataToProcess.map(item => {
                    const target = cleanVal(findKey(item, "IndividualTarget") || findKey(item, "目標"));
                    const sales = cleanVal(findKey(item, "TotalSales") || findKey(item, "累計銷售"));
                    const mtd = cleanVal(findKey(item, "MTD") || findKey(item, "達成率"));
                    return {
                        center: findKey(item, "Center") || findKey(item, "渠道") || findKey(item, "中心") || "未定義",
                        therapist: findKey(item, "Therapist") || findKey(item, "專員") || "未知",
                        target: target,
                        monthlySales: sales,
                        mtd: mtd || (target > 0 ? (sales / target) * 100 : 0),
                        todaySales: cleanVal(findKey(item, "今日開單")),
                        remaining: cleanVal(findKey(item, "轉燈尚欠") || findKey(item, "尚欠")),
                        yesterdayShow: findKey(item, "昨天SHOW") || 0,
                        yesterdayShowICB: findKey(item, "SHOWICB") || 0,
                        futureICB: findKey(item, "未來ICB") || 0,
                        nodeTotal: findKey(item, "Node總數") || 0,
                        mau: cleanVal(findKey(item, "MAU")) || 0,
                        nodeInc: findKey(item, "3天增加") || 0,
                        ptSign: findKey(item, "Paid Trial Sign") || findKey(item, "PT") || 0,
                        ptSignToday: findKey(item, "Paid Trial Sign (Today)") || findKey(item, "PTToday") || 0,
                        pkgSign: findKey(item, "Package Sign") || findKey(item, "Pkg") || 0,
                        pkgSignToday: findKey(item, "Package Sign (Today)") || findKey(item, "PkgToday") || 0,
                        penetration: cleanVal(findKey(item, "滲透率")) || 0,
                        bdayBook: findKey(item, "Bday giftcard book") || findKey(item, "Bday") || 0,
                        bdayInc: findKey(item, "Bday giftcard 三天增加") || findKey(item, "BdayInc") || 0,
                        plasmaBook: findKey(item, "Plasma giftcard book") || findKey(item, "Plasma") || 0,
                        plasmaInc: findKey(item, "Plasma giftcard 三天增加") || findKey(item, "PlasmaInc") || 0
                    };
                });

                document.getElementById('lastSync').textContent = new Date().toLocaleTimeString();
                statusContainer.classList.add('hidden');
                dashboardContent.classList.remove('opacity-30', 'pointer-events-none');
                updateFilterOptions();
                renderDashboard();

            } catch (err) {
                console.error(err);
                errorState.classList.remove('hidden');
                loadingState.classList.add('hidden');
                document.getElementById('errorMsg').textContent = err.message;
            } finally {
                refreshIcon.classList.remove('animate-spin');
                safeCreateIcons();
            }
        }

        function updateFilterOptions() {
            const centers = ['All', ...new Set(allData.map(d => d.center))].sort();
            document.getElementById('centerFilter').innerHTML = centers.map(c => `<option value="${c}">${c === 'All' ? '所有渠道' : c}</option>`).join('');
            updateTherapistOptions();
        }

        function updateTherapistOptions() {
            const centerValue = document.getElementById('centerFilter').value;
            const therapists = ['All', ...new Set(allData.filter(d => centerValue === 'All' || d.center === centerValue).map(d => d.therapist))].sort();
            document.getElementById('therapistFilter').innerHTML = therapists.map(t => `<option value="${t}">${t === 'All' ? '所有專員' : t}</option>`).join('');
        }

        function onFilterChange() {
            selectedCenter = document.getElementById('centerFilter').value;
            selectedTherapist = document.getElementById('therapistFilter').value;
            renderDashboard();
        }

        function getStatus(mtd) {
            if (mtd >= 200) return { name: '紫', color: 'bg-purple-600', text: 'text-purple-600' };
            if (mtd >= 150) return { name: '藍', color: 'bg-blue-600', text: 'text-blue-600' };
            if (mtd >= 100) return { name: '綠', color: 'bg-green-600', text: 'text-green-600' };
            if (mtd >= 80) return { name: '黃', color: 'bg-amber-400', text: 'text-amber-600' };
            return { name: '紅', color: 'bg-red-600', text: 'text-red-600' };
        }

        function renderDashboard() {
            const dashboardContent = document.getElementById('dashboardContent');
            const isCardMode = document.getElementById('viewToggle').checked;
            const filtered = allData.filter(item => (selectedCenter === 'All' || item.center === selectedCenter) && (selectedTherapist === 'All' || item.therapist === selectedTherapist));
            document.getElementById('resultCount').textContent = filtered.length;

            if (filtered.length === 0) {
                dashboardContent.innerHTML = `<div class="bg-white p-20 rounded-[3rem] text-center border-2 border-dashed border-slate-200 text-slate-400 font-bold">暫無匹配數據</div>`;
                return;
            }

            if (isCardMode) {
                renderCardView(filtered);
            } else {
                renderTableView(filtered);
            }
            safeCreateIcons();
        }

        function renderTableView(data) {
            document.getElementById('dashboardContent').innerHTML = `
                <div class="bg-white rounded-[2rem] shadow-xl border overflow-hidden">
                    <div class="table-container overflow-x-auto">
                        <table class="w-full text-left border-collapse min-w-[1800px]">
                            <thead>
                                <tr class="bg-slate-900 text-white text-[10px] uppercase font-black tracking-wider text-left">
                                    <th class="p-4 sticky-col z-20 text-left" style="left: 0;">渠道</th>
                                    <th class="p-4 text-left">專員</th>
                                    <th class="p-4 text-right">每月目標</th>
                                    <th class="p-4 text-right">累計銷售</th>
                                    <th class="p-4 text-center">達成率</th>
                                    <th class="p-4 text-right">今日開單</th>
                                    <th class="p-4 text-right text-purple-300">轉燈尚欠</th>
                                    <th class="p-4 border-l border-slate-700 text-center">昨天SHOW</th>
                                    <th class="p-4 text-center">SHOW ICB</th>
                                    <th class="p-4 text-center">未來預約</th>
                                    <th class="p-4 border-l border-slate-700 text-center">Node總數</th>
                                    <th class="p-4 text-center">MAU</th>
                                    <th class="p-4 text-center">3天增加</th>
                                    <th class="p-4 border-l border-slate-700 text-center">PT簽單</th>
                                    <th class="p-4 text-center">Pkg簽單</th>
                                    <th class="p-4 text-center">滲透率</th>
                                    <th class="p-4 border-l border-slate-700 text-center text-pink-300">Bday禮遇</th>
                                    <th class="p-4 text-center text-pink-300">Plasma預訂</th>
                                    <th class="p-4 text-center">狀態</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100 text-sm font-medium text-slate-700">
                                ${data.map(item => {
                                    const s = getStatus(item.mtd);
                                    return `
                                    <tr class="hover:bg-slate-50 transition-colors group">
                                        <td class="p-4 sticky-col font-black text-slate-900 border-r-2 border-slate-100 text-left">${item.center}</td>
                                        <td class="p-4 whitespace-nowrap text-slate-500 font-bold text-left">${item.therapist}</td>
                                        <td class="p-4 text-right whitespace-nowrap text-slate-400">$${item.target.toLocaleString()}</td>
                                        <td class="p-4 text-right whitespace-nowrap font-black text-slate-800">$${item.monthlySales.toLocaleString()}</td>
                                        <td class="p-4 text-center whitespace-nowrap font-black ${s.text}">${item.mtd.toFixed(1)}%</td>
                                        <td class="p-4 text-right whitespace-nowrap font-black text-emerald-600 bg-emerald-50/30">$${item.todaySales.toLocaleString()}</td>
                                        <td class="p-4 text-right whitespace-nowrap font-bold text-purple-600 bg-purple-50/30">$${item.remaining.toFixed(1)}</td>
                                        <td class="p-4 text-center border-l border-slate-100">${item.yesterdayShow}</td>
                                        <td class="p-4 text-center font-bold text-indigo-600">${item.yesterdayShowICB}</td>
                                        <td class="p-4 text-center">${item.futureICB}</td>
                                        <td class="p-4 text-center border-l border-slate-100">${item.nodeTotal}</td>
                                        <td class="p-4 text-center font-bold text-blue-600">${item.mau.toFixed(1)}%</td>
                                        <td class="p-4 text-center text-blue-700 bg-blue-50/50">+${item.nodeInc}</td>
                                        <td class="p-4 text-center border-l border-slate-100 font-bold">${item.ptSign} <span class="text-[10px] text-emerald-500">+${item.ptSignToday}</span></td>
                                        <td class="p-4 text-center font-bold">${item.pkgSign} <span class="text-[10px] text-emerald-500">+${item.pkgSignToday}</span></td>
                                        <td class="p-4 text-center text-amber-600 font-bold">${item.penetration.toFixed(1)}%</td>
                                        <td class="p-4 text-center border-l border-slate-100 font-bold text-pink-600">${item.bdayBook} <span class="text-[10px]">+${item.bdayInc}</span></td>
                                        <td class="p-4 text-center font-bold text-pink-600">${item.plasmaBook} <span class="text-[10px]">+${item.plasmaInc}</span></td>
                                        <td class="p-4 text-center">
                                            <span class="inline-block w-6 h-6 rounded-full ${s.color} text-white text-[10px] flex items-center justify-center font-black shadow-sm mx-auto">${s.name}</span>
                                        </td>
                                    </tr>`;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>`;
        }

        function renderCardView(data) {
            document.getElementById('dashboardContent').innerHTML = `
                <div class="grid grid-cols-1 gap-12">
                    ${data.map(item => {
                        const s = getStatus(item.mtd);
                        return `
                        <div class="bg-white rounded-[3rem] shadow-xl border overflow-hidden text-left">
                            <div class="bg-slate-900 p-8 text-white flex flex-col md:flex-row justify-between gap-6">
                                <div class="flex items-center gap-4">
                                    <div class="w-16 h-16 rounded-2xl festival-gradient flex items-center justify-center shadow-lg"><i data-lucide="user-check"></i></div>
                                    <div class="text-left">
                                        <h2 class="text-3xl font-black text-left">${item.therapist}</h2>
                                        <p class="text-indigo-400 text-xs font-black uppercase text-left">${item.center}</p>
                                    </div>
                                </div>
                                <div class="grid grid-cols-2 md:grid-cols-5 gap-3 flex-1 text-left">
                                    <div class="bg-white/5 p-3 rounded-xl border border-white/10 text-left"><p class="text-[9px] text-slate-500 uppercase font-black text-left">每月目標</p><p class="font-black text-left">$${item.target.toLocaleString()}</p></div>
                                    <div class="bg-white/5 p-3 rounded-xl border border-white/10 text-left"><p class="text-[9px] text-slate-500 uppercase font-black text-left">累計銷售</p><p class="font-black text-left">$${item.monthlySales.toLocaleString()}</p></div>
                                    <div class="bg-white/10 p-3 rounded-xl border border-white/20 text-left"><p class="text-[9px] text-slate-500 uppercase font-black text-left">達成進度</p><p class="text-lg font-black ${s.text} text-left">${item.mtd.toFixed(1)}%</p></div>
                                    <div class="bg-purple-500/10 p-3 rounded-xl border border-purple-500/20 text-left"><p class="text-[9px] text-purple-400 uppercase font-black text-left">轉燈尚欠</p><p class="font-black text-purple-400 text-left">$${item.remaining.toFixed(1)}</p></div>
                                    <div class="bg-emerald-500/10 p-3 rounded-xl border border-emerald-500/20 text-left"><p class="text-[9px] text-emerald-400 uppercase font-black text-left">今日開單</p><p class="font-black text-emerald-400 text-left">$${item.todaySales.toLocaleString()}</p></div>
                                </div>
                            </div>
                            <div class="p-8 grid grid-cols-1 md:grid-cols-4 gap-8">
                                <div class="space-y-4 text-left">
                                    <div class="flex items-center gap-2 text-indigo-600 border-b pb-2"><i data-lucide="tv-2" size="16"></i><span class="text-[10px] font-black uppercase">直播轉化</span></div>
                                    <div class="text-sm font-bold flex justify-between text-left text-slate-500"><span>昨天SHOW</span><span class="text-slate-900">${item.yesterdayShow}</span></div>
                                    <div class="text-sm font-bold flex justify-between text-indigo-600 text-left"><span>SHOW ICB</span><span>${item.yesterdayShowICB}</span></div>
                                    <div class="text-sm font-bold flex justify-between text-left text-slate-500"><span>未來預約</span><span class="text-slate-900">${item.futureICB}</span></div>
                                </div>
                                <div class="space-y-4 text-left">
                                    <div class="flex items-center gap-2 text-blue-600 border-b pb-2"><i data-lucide="share-2" size="16"></i><span class="text-[10px] font-black uppercase">分發流量</span></div>
                                    <div class="text-sm font-bold flex justify-between text-left text-slate-500"><span>Node總數</span><span class="text-slate-900">${item.nodeTotal}</span></div>
                                    <div class="text-sm font-bold flex justify-between text-blue-600 text-left"><span>MAU活躍度</span><span>${item.mau.toFixed(1)}%</span></div>
                                    <div class="bg-blue-50 p-2 rounded-xl text-blue-700 font-black flex justify-between text-left"><span>3天增加</span><span>+${item.nodeInc}</span></div>
                                </div>
                                <div class="space-y-4 text-left">
                                    <div class="flex items-center gap-2 text-amber-500 border-b pb-2"><i data-lucide="zap" size="16"></i><span class="text-[10px] font-black uppercase">產品轉化</span></div>
                                    <div class="text-sm font-bold flex justify-between text-left text-slate-500"><span>PT簽單</span><span class="text-slate-900">${item.ptSign} <span class="text-emerald-500 ml-1 text-xs">+${item.ptSignToday}</span></span></div>
                                    <div class="text-sm font-bold flex justify-between text-left text-slate-500"><span>Pkg簽單</span><span class="text-slate-900">${item.pkgSign} <span class="text-emerald-500 ml-1 text-xs">+${item.pkgSignToday}</span></span></div>
                                    <div class="text-sm font-bold flex justify-between text-amber-600 text-left"><span>品牌滲透率</span><span>${item.penetration.toFixed(1)}%</span></div>
                                </div>
                                <div class="space-y-4 text-left">
                                    <div class="flex items-center gap-2 text-pink-500 border-b pb-2"><i data-lucide="heart" size="16"></i><span class="text-[10px] font-black uppercase">限定福利</span></div>
                                    <div class="text-sm font-bold flex justify-between text-left text-pink-600"><span>Bday禮遇</span><span>${item.bdayBook} <span class="text-pink-400 ml-1 text-xs">+${item.bdayInc}</span></span></div>
                                    <div class="text-sm font-bold flex justify-between text-left text-pink-600"><span>Plasma預訂</span><span>${item.plasmaBook} <span class="text-pink-400 ml-1 text-xs">+${item.plasmaInc}</span></span></div>
                                    <div class="mt-4 p-4 rounded-2xl bg-slate-50 flex items-center gap-3 border border-slate-100">
                                        <div class="w-8 h-8 rounded-full bg-white flex items-center justify-center text-amber-400 shadow-sm"><i data-lucide="crown" size="14"></i></div>
                                        <p class="text-[10px] font-black text-slate-400 uppercase">衝刺 200% 紫燈</p>
                                    </div>
                                </div>
                            </div>
                        </div>`;
                    }).join('')}
                </div>`;
        }

        window.onload = fetchData;
    </script>
</body>
