<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Interaction Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f1f5f9;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }
        canvas {
            cursor: grab;
        }
        canvas:active {
            cursor: grabbing;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        input[type="range"] {
            accent-color: #38bdf8;
        }
    </style>
</head>
<body>

    <!-- Simplified UI Overlay -->
    <div class="fixed top-1/2 left-10 -translate-y-1/2 z-10 w-72 glass-panel p-8 rounded-3xl shadow-2xl flex flex-col gap-8">
        <div class="space-y-2">
            <label class="text-sm font-semibold text-slate-400 uppercase tracking-widest">Node Count</label>
            <div id="nodeVal" class="text-5xl font-black text-white">200</div>
            <input type="range" id="nodeInput" min="2" max="400" value="200" class="w-full mt-4">
        </div>

        <div class="pt-6 border-t border-slate-700/50">
            <label class="text-xs font-semibold text-sky-400 uppercase tracking-widest mb-1 block">Total Interactions</label>
            <div id="edgeVal" class="text-4xl font-mono font-bold text-sky-400 tracking-tight">19,900</div>
        </div>
    </div>

    <!-- Status indicator -->
    <div class="fixed bottom-6 right-6 glass-panel px-4 py-2 rounded-full text-[10px] text-slate-500 uppercase tracking-tighter">
        Real-time Interaction Simulation Active
    </div>

    <canvas id="simCanvas"></canvas>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const nodeInput = document.getElementById('nodeInput');
        const nodeVal = document.getElementById('nodeVal');
        const edgeVal = document.getElementById('edgeVal');

        let nodes = [];
        let edges = [];
        let width, height;
        let transform = { x: 0, y: 0, scale: 1 };
        let isDragging = false;
        let lastMouse = { x: 0, y: 0 };

        function init() {
            resize();
            generateNetwork();
            animate();
        }

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width * window.devicePixelRatio;
            canvas.height = height * window.devicePixelRatio;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            transform.x = width / 2 + 100; // Offset from the left panel
            transform.y = height / 2;
        }

        function generateNetwork() {
            const n = parseInt(nodeInput.value);
            // Formula for complete graph interactions: n(n-1)/2
            const interactions = (n * (n - 1)) / 2;

            nodeVal.textContent = n;
            edgeVal.textContent = interactions.toLocaleString();

            nodes = [];
            for (let i = 0; i < n; i++) {
                nodes.push({
                    x: (Math.random() - 0.5) * 500,
                    y: (Math.random() - 0.5) * 500,
                    vx: 0,
                    vy: 0,
                    radius: 4,
                    color: `hsl(${190 + Math.random() * 30}, 80%, 60%)`
                });
            }

            edges = [];
            // Optimization: Only render a subset of lines to keep 60fps at high node counts
            const renderLimit = Math.min(interactions, 1000); 
            for (let i = 0; i < renderLimit; i++) {
                const s = Math.floor(Math.random() * n);
                let t = Math.floor(Math.random() * n);
                while (t === s) t = Math.floor(Math.random() * n);
                edges.push({ s: nodes[s], t: nodes[t] });
            }
        }

        function applyPhysics() {
            const n = nodes.length;
            const charge = -25;
            const spring = 0.01;
            const damping = 0.85;

            for (let i = 0; i < n; i++) {
                const a = nodes[i];
                for (let j = i + 1; j < n; j++) {
                    const b = nodes[j];
                    const dx = b.x - a.x;
                    const dy = b.y - a.y;
                    const d2 = dx*dx + dy*dy + 1;
                    const d = Math.sqrt(d2);
                    if (d < 400) {
                        const f = charge / d2;
                        a.vx += (dx/d) * f; a.vy += (dy/d) * f;
                        b.vx -= (dx/d) * f; b.vy -= (dy/d) * f;
                    }
                }
            }

            edges.forEach(e => {
                const dx = e.t.x - e.s.x;
                const dy = e.t.y - e.s.y;
                const d = Math.sqrt(dx*dx + dy*dy) || 1;
                const f = (d - 150) * spring;
                e.s.vx += (dx/d) * f; e.s.vy += (dy/d) * f;
                e.t.vx -= (dx/d) * f; e.t.vy -= (dy/d) * f;
            });

            nodes.forEach(node => {
                node.vx *= damping; node.vy *= damping;
                node.x += node.vx; node.y += node.vy;
                node.vx -= node.x * 0.003; node.vy -= node.y * 0.003;
            });
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            ctx.save();
            ctx.translate(transform.x, transform.y);
            ctx.scale(transform.scale, transform.scale);

            ctx.lineWidth = 0.8;
            edges.forEach(e => {
                ctx.strokeStyle = 'rgba(56, 189, 248, 0.1)';
                ctx.beginPath();
                ctx.moveTo(e.s.x, e.s.y);
                ctx.lineTo(e.t.x, e.t.y);
                ctx.stroke();
            });

            nodes.forEach(n => {
                ctx.fillStyle = n.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = n.color;
                ctx.beginPath();
                ctx.arc(n.x, n.y, n.radius, 0, Math.PI * 2);
                ctx.fill();
            });

            ctx.restore();
        }

        function animate() {
            applyPhysics();
            draw();
            requestAnimationFrame(animate);
        }

        nodeInput.addEventListener('input', generateNetwork);

        window.addEventListener('resize', resize);
        canvas.addEventListener('mousedown', (e) => { isDragging = true; lastMouse = { x: e.clientX, y: e.clientY }; });
        window.addEventListener('mousemove', (e) => {
            if (isDragging) {
                transform.x += (e.clientX - lastMouse.x);
                transform.y += (e.clientY - lastMouse.y);
                lastMouse = { x: e.clientX, y: e.clientY };
            }
        });
        window.addEventListener('mouseup', () => isDragging = false);
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            transform.scale *= (e.deltaY > 0 ? 0.9 : 1.1);
            transform.scale = Math.max(0.1, Math.min(3, transform.scale));
        }, { passive: false });

        init();
    </script>
</body>
</html>
