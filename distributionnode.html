<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node Momentum Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase Integration for Daily Tracking -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let db;
        let auth;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'distribution-node-dashboard';

        try {
            const firebaseConfig = JSON.parse(__firebase_config);
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            window.db = db;
        } catch (e) {
            console.error("Firebase Configuration Missing or Invalid:", e);
        }

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) {
                console.error("Authentication Service Unavailable:", e);
            }
        };

        window.initDashboard = async () => {
            const timeout = new Promise(res => setTimeout(() => {
                console.warn("Sync taking too long, entering failsafe mode...");
                res();
            }, 4000));

            try {
                await Promise.race([initAuth(), timeout]);
            } finally {
                fetchData();
            }
        };

        window.calculateDailyDelta = async (currentTotal, metricKey) => {
            if (!auth?.currentUser || !db) return "(+0)";
            try {
                const fetchPromise = (async () => {
                    const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'daily_snapshots');
                    const snap = await getDocs(colRef);
                    const allRecords = snap.docs.map(d => d.data()).filter(d => d.metric === metricKey).sort((a, b) => b.timestamp - a.timestamp);
                    const todayStr = new Date().toDateString();
                    const yesterdayRecord = allRecords.find(d => new Date(d.timestamp).toDateString() !== todayStr);
                    const todayRecordExists = allRecords.some(d => d.timestamp && new Date(d.timestamp).toDateString() === todayStr);
                    if (!todayRecordExists) {
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'daily_snapshots', `${metricKey}_${Date.now()}`), {
                            metric: metricKey, value: currentTotal, timestamp: Date.now()
                        });
                    }
                    const diff = yesterdayRecord ? (currentTotal - yesterdayRecord.value) : 0;
                    const sign = diff >= 0 ? '+' : '';
                    return `(${sign}${diff})`;
                })();
                return await Promise.race([fetchPromise, new Promise(res => setTimeout(() => res("(+0)"), 1500))]);
            } catch (e) { return "(+0)"; }
        };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; font-size: 1rem; overflow-x: hidden; }
        .glass-panel { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1rem; }
        .stat-card { transition: transform 0.2s ease, border-color 0.2s ease; }
        .stat-card:hover { border-color: rgba(56, 189, 248, 0.4); transform: translateY(-2px); }
        
        .kpi-table th { font-size: 13px; letter-spacing: 0.05em; color: #cbd5e1; text-transform: uppercase; padding: 14px 4px; border: 1px solid #1e293b; line-height: 1.1; text-align: center; background: rgba(15, 23, 42, 0.95); font-weight: 900; }
        .kpi-table td { padding: 8px 4px; font-family: 'Inter', sans-serif; border: 1px solid rgba(30, 41, 59, 0.5); text-align: center; vertical-align: middle; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .stacked-cell { display: flex; flex-direction: column; gap: 2px; align-items: center; justify-content: center; height: 100%; width: 100%; }
        .mini-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; margin-top: 4px; width: 100%; }
        
        .mini-label { font-size: 10px; color: #94a3b8; text-transform: uppercase; font-weight: 900; line-height: 1; opacity: 1; text-align: center; }
        .grid-item { background: rgba(255, 255, 255, 0.07); padding: 6px 2px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.03); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .data-value-lg { font-size: 26px; font-weight: 900; letter-spacing: -0.05em; line-height: 1; text-align: center; }
        .data-value-xl { font-size: 34px; font-weight: 900; letter-spacing: -0.08em; line-height: 1; text-align: center; }
        
        .filter-tab { transition: all 0.3s ease; cursor: pointer; border: 1px solid transparent; }
        .filter-tab.active { background: rgba(168, 85, 247, 0.4); border-color: rgba(168, 85, 247, 0.6); color: #fff; box-shadow: 0 0 25px rgba(168, 85, 247, 0.4); transform: scale(1.05); }

        .floor-tab { transition: all 0.2s ease; cursor: pointer; }
        .floor-tab.active { background: rgba(56, 189, 248, 0.3); border-color: rgba(56, 189, 248, 0.5); color: #fff; }
    </style>
</head>
<body class="p-2 md:p-6">

        <div id="loading-spinner" class="w-16 h-16 border-4 border-sky-500 border-t-transparent rounded-full animate-spin"></div>
        <p class="text-sky-400 font-mono text-lg animate-pulse uppercase tracking-widest font-black">Syncing Node Momentum...</p>
    </div>

    <header class="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-6">
        <div>
            <h1 class="text-4xl font-black tracking-tighter bg-gradient-to-r from-sky-400 to-indigo-400 bg-clip-text text-transparent uppercase italic leading-none">
                Node Momentum
            </h1>
            <p class="text-slate-400 mt-1 text-sm font-black tracking-widest uppercase opacity-70">Activation & Replication Intelligence</p>

            </button>
            <div class="px-5 py-2 glass-panel font-mono text-slate-300 font-bold text-sm" id="current-time"></div>

    <!-- SECTION 1: OVERVIEW -->
    <section class="mb-10">
        <div class="flex items-center gap-3 mb-4">
            <h2 class="text-2xl font-black text-white tracking-tighter uppercase italic">Overview</h2>
            <div class="h-0.5 flex-1 bg-gradient-to-r from-slate-800 to-transparent ml-2"></div>
        </div>
        <div id="overview-container"></div>
    </section>

    <!-- SECTION 2: IDENTITY ANALYSIS -->
    <section class="mb-10">
        <div class="flex items-center gap-3 mb-4">
            <h2 class="text-2xl font-black text-white tracking-tighter uppercase italic text-sky-400">Identity Analysis</h2>
            <div class="h-0.5 flex-1 bg-gradient-to-r from-sky-900/30 to-transparent ml-2"></div>
        </div>
        <div class="glass-panel overflow-hidden border border-white/10 shadow-xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[1000px] kpi-table">
                    <thead>
                        <tr class="bg-slate-900/80 border-b-2 border-slate-800 text-slate-400 uppercase font-black">
                            <th class="p-6 text-center">Shop Category</th>
                            <th class="p-6 text-center text-sky-400">Total Nodes (Δ)</th>
                            <th class="p-6 text-center text-emerald-400">Active traffic (Δ)</th>
                            <th class="p-6 text-center text-rose-400">Active purchase (Δ)</th>
                        </tr>
                    </thead>
                    <tbody id="identities-body" class="divide-y divide-slate-800/50"></tbody>
                </table>
            </div>
        </div>
    </section>

    <!-- SECTION 3: MKT PILLAR BREAKDOWN -->
    <section class="mb-12">
        <div class="flex items-center gap-3 mb-6">
            <h2 class="text-3xl font-black text-white tracking-tighter uppercase italic text-emerald-400">MKT Pillar Breakdown</h2>
            <div class="h-1 flex-1 bg-gradient-to-r from-emerald-900/30 to-transparent ml-4"></div>
        </div>
        <div id="mkt-pillar-container" class="grid grid-cols-1 lg:grid-cols-2 gap-8"></div>
    </section>

    <!-- SECTION 4: OPERATION EXECUTION BREAKDOWN -->
    <section class="mb-16">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
            <h2 class="text-3xl font-black text-white tracking-tighter uppercase italic text-fuchsia-400">Operation Execution Breakdown</h2>
            
            <div class="flex items-center glass-panel p-1 border border-white/10 overflow-hidden shadow-2xl">
                <button onclick="setOpsBrandFilter('All')" class="filter-tab px-5 py-2 rounded-lg text-[11px] font-black uppercase tracking-widest" id="ops-filter-All">All</button>
                <button onclick="setOpsBrandFilter('Dermes')" class="filter-tab px-5 py-2 rounded-lg text-[11px] font-black uppercase tracking-widest active" id="ops-filter-Dermes">Dermes</button>
                <button onclick="setOpsBrandFilter('Elyze')" class="filter-tab px-4 py-1.5 rounded-lg text-[11px] font-black uppercase tracking-widest" id="ops-filter-Elyze">Elyze</button>
                <button onclick="setBrandFilter('Reenex')" class="filter-tab px-5 py-2 rounded-lg text-[11px] font-black uppercase tracking-widest" id="ops-filter-Reenex">Reenex</button>
                <button onclick="setOpsBrandFilter('Evvus')" class="filter-tab px-5 py-2 rounded-lg text-[11px] font-black uppercase tracking-widest" id="ops-filter-Evvus">Evvus</button>
            </div>
        </div>
        <div class="flex flex-col gap-8" id="ops-container"></div>
    </section>

    <!-- SECTION 5: THERAPIST PERFORMANCE BREAKDOWN -->
    <section class="mb-24">
        <div class="flex flex-col gap-6 mb-8">
            <div class="flex items-center gap-3">
                <h2 class="text-3xl font-black text-white tracking-tighter uppercase italic text-sky-400">Therapist Performance Breakdown</h2>
                <div class="h-1 flex-1 bg-gradient-to-r from-sky-900/30 to-transparent ml-4"></div>
            </div>
            
            <div class="flex flex-col md:flex-row gap-6">
                <!-- THERAPIST BRAND FILTER -->
                <div class="flex items-center glass-panel p-1 border border-white/10 overflow-hidden shadow-xl w-fit">
                    <button onclick="setTherapistBrand('Dermes')" class="filter-tab px-4 py-2 rounded-lg text-[11px] font-black uppercase tracking-widest active" id="t-brand-Dermes">Dermes</button>
                    <button onclick="setTherapistBrand('Elyze')" class="filter-tab px-4 py-2 rounded-lg text-[11px] font-black uppercase tracking-widest" id="t-brand-Elyze">Elyze</button>
                    <button onclick="setTherapistBrand('Reenex')" class="filter-tab px-4 py-2 rounded-lg text-[11px] font-black uppercase tracking-widest" id="t-brand-Reenex">Reenex</button>
                    <button onclick="setTherapistBrand('Evvus')" class="filter-tab px-4 py-2 rounded-lg text-[11px] font-black uppercase tracking-widest" id="t-brand-Evvus">Evvus</button>
                </div>

                <!-- THERAPIST FLOOR FILTER (CONTAINER) -->
                <div id="floor-filter-container" class="flex flex-wrap items-center gap-2">
                    <!-- Dynamic floors injected here -->
                </div>
            </div>
        </div>
        <div id="therapist-container"></div>
    </section>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycby4TpKlr891WusEz5Hh3MmXFYsaUWSD00zC3MMj1a3T5Aj1f9VAJ3282ey6mwLfXbpcJA/exec";
        const preferredBrandOrder = ['Dermes', 'Elyze', 'Reenex', 'Evvus'];
        const colors = { dermes: 'sky', elyze: 'emerald', reenex: 'rose', evvus: 'indigo', default: 'slate' };
        
        let lastData = null;
        let opsFilterBrand = 'Dermes';
        let therapistFilterBrand = 'Dermes';
        let therapistFilterFloor = null;

        function parseSheetNum(val) {
            if (typeof val === 'number') return val;
            if (!val) return 0;
            const cleaned = val.toString().replace(/,/g, '').replace(/[^\d.-]/g, '');
            return parseFloat(cleaned) || 0;
        }

        function getBracketHtml(val, sizeClass = "text-base") {
            const num = parseSheetNum(val);
            const colorClass = num >= 0 ? 'text-emerald-500' : 'text-rose-500';
            const sign = num >= 0 ? '+' : '';
            return `<span class="${colorClass} ${sizeClass} font-black italic tabular-nums tracking-tighter">(${sign}${num})</span>`;
        }

        function setOpsBrandFilter(brand) {
            opsFilterBrand = brand;
            document.querySelectorAll('[id^="ops-filter-"]').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`ops-filter-${brand}`).classList.add('active');
            if (lastData) renderOperations(lastData.operations);
        }

        function setTherapistBrand(brand) {
            therapistFilterBrand = brand;
            therapistFilterFloor = null; // Reset floor to auto-select first
            document.querySelectorAll('[id^="t-brand-"]').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`t-brand-${brand}`).classList.add('active');
            if (lastData) renderTherapists(lastData.Therapists || lastData.therapists || []);
        }

        function setTherapistFloor(floor) {
            therapistFilterFloor = floor;
            if (lastData) renderTherapists(lastData.Therapists || lastData.therapists || []);
        }

        async function fetchData() {
            setSyncStatus(true);
            try {
                const response = await fetch(`${API_URL}?t=${Date.now()}`);
                const data = await response.json();
                lastData = data;
                updateDashboard(data);
                document.getElementById('loading-overlay').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-overlay').style.display = 'none', 500);
            } catch (error) {
                console.error("Fetch Error:", error);
            } finally {
                setSyncStatus(false);
            }
        }

        function setSyncStatus(isSyncing) {
            const status = document.getElementById('sync-status');
            const text = document.getElementById('sync-text');
            if (isSyncing) {
                status.classList.add('animate-pulse');
                text.innerText = "Syncing...";
            } else {
                status.classList.remove('animate-pulse');
                text.innerText = "Live Feed";
            }
        }

        async function updateDashboard(data) {
            await renderOverview(data.overview);
            renderIdentities(data.identities);
            renderMKTPillars(data.overview); 
            renderOperations(data.operations);
            renderTherapists(data.Therapists || data.therapists || []);
        }

        async function renderOverview(overviewData) {
            const container = document.getElementById('overview-container');
            container.innerHTML = '';
            const getVal = (k) => parseSheetNum(overviewData.find(i => i.Metric === k)?.Total);
            const getDelta = (k) => parseSheetNum(overviewData.find(i => i.Metric === k)?.Change_P30d);

            const replicationData = { 
                val: getVal("Total Nodes"), delta: getDelta("Total Nodes"),
                style: { border: 'border-l-sky-500', label: 'Total Nodes', key: 'total_nodes' } 
            };
            
            const activationData = [
                { val: getVal("Traffic"), delta: getDelta("Traffic"), style: { border: 'border-l-emerald-500', label: 'Active traffic', key: 'active_traffic' }, head: getVal("Traffic Head"), tail: getVal("Traffic Tail") },
                { val: getVal("Purchase"), delta: getDelta("Purchase"), style: { border: 'border-l-rose-500', label: 'Active purchase', key: 'active_purchase' }, head: getVal("Purchase Head"), tail: getVal("Purchase Tail") }
            ];

            const dailyRep = await window.calculateDailyDelta(replicationData.val, replicationData.style.key);

            let replicationCardHtml = `
                <div class="glass-panel p-6 stat-card border-l-8 ${replicationData.style.border} h-full relative overflow-hidden">
                    <div class="flex flex-col items-center justify-center">
                        <span class="text-slate-400 text-[12px] font-black uppercase mb-4">${replicationData.style.label}</span>
                        <span class="text-6xl font-black tracking-tighter tabular-nums mb-2">${replicationData.val.toLocaleString()}</span>
                        <div class="flex items-center gap-2">
                            ${getBracketHtml(replicationData.delta, 'text-2xl')}
                            <span class="text-[9px] text-slate-500 uppercase font-black">30d Rolling Change</span>
                        </div>
                        <div class="mt-4 flex flex-col items-center">
                            <span class="text-[10px] text-slate-500 uppercase font-black">Daily Δ</span>
                            <span class="text-emerald-400 font-black text-xl tabular-nums">${dailyRep}</span>
                        </div>
                    </div>
                </div>`;

            let activationCardsHtml = '';
            for (const entry of activationData) {
                const dailyAct = await window.calculateDailyDelta(entry.val, entry.style.key);
                activationCardsHtml += `
                    <div class="glass-panel p-6 stat-card border-l-8 ${entry.style.border} relative overflow-hidden">
                        <div class="flex flex-col items-center justify-center">
                            <span class="text-slate-400 text-[12px] font-black uppercase mb-4">${entry.style.label}</span>
                            <span class="text-6xl font-black tracking-tighter tabular-nums mb-2">${entry.val.toLocaleString()}</span>
                            <div class="flex items-center gap-2 mb-6">
                                ${getBracketHtml(entry.delta, 'text-2xl')}
                                <span class="text-[9px] text-slate-500 uppercase font-black">30d Rolling Change</span>
                            </div>
                            <div class="grid grid-cols-2 gap-8 border-t border-white/5 pt-4 w-full">
                                <div class="flex flex-col items-center"><span class="text-[10px] text-slate-500 font-black uppercase">Head (Owner)</span><span class="text-3xl font-black text-white tabular-nums">${(entry.head || 0).toLocaleString()}</span></div>
                                <div class="flex flex-col items-center"><span class="text-[10px] text-slate-500 font-black uppercase">Tail (Customer)</span><span class="text-3xl font-black text-white tabular-nums">${(entry.tail || 0).toLocaleString()}</span></div>
                            </div>
                        </div>
                    </div>`;
            }
            container.innerHTML = `<div class="flex flex-col lg:flex-row gap-4"><div class="lg:w-1/3 flex flex-col">${replicationCardHtml}</div><div class="lg:w-2/3 flex flex-col"><div class="grid grid-cols-1 md:grid-cols-2 gap-4">${activationCardsHtml}</div></div></div>`;
        }

        function renderIdentities(identitiesData) {
            const tbody = document.getElementById('identities-body');
            tbody.innerHTML = '';
            identitiesData.forEach(row => {
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-800/40 transition-colors">
                        <td class="p-4 font-black text-3xl text-white uppercase italic tracking-tighter text-center">${row['Shop Category'] || row.Identity}</td>
                        <td class="p-4 text-center mono text-4xl font-black tabular-nums tracking-tighter text-sky-400">${parseSheetNum(row.Nodes).toLocaleString()} ${getBracketHtml(row.Nodes_Delta, 'text-2xl')}</td>
                        <td class="p-4 text-center mono text-4xl font-black tabular-nums tracking-tighter text-emerald-400">${parseSheetNum(row.Traffic).toLocaleString()} ${getBracketHtml(row.Traffic_Delta, 'text-2xl')}</td>
                        <td class="p-4 text-center mono text-4xl font-black tabular-nums tracking-tighter text-rose-400">${parseSheetNum(row.Purchase).toLocaleString()} ${getBracketHtml(row.Purchase_Delta, 'text-2xl')}</td>
                    </tr>`;
            });
        }

        function renderMKTPillars(overviewData) {
            const container = document.getElementById('mkt-pillar-container');
            const getVal = (m) => parseSheetNum(overviewData.find(i => i.Metric === m)?.Total);
            
            const ptHtml = `
                <div class="glass-panel p-8 border-l-8 border-indigo-500 shadow-2xl">
                    <div class="flex justify-between items-center mb-6 border-b border-white/10 pb-4">
                        <h4 class="text-2xl font-black uppercase italic text-indigo-400">Paid Trial giftcard</h4>
                    </div>
                    <div class="flex justify-center items-center gap-16 mb-8">
                        <div class="flex flex-col items-center"><span class="mini-label text-indigo-400/80 mb-1">HEAD (Entitled)</span><span class="text-7xl font-black text-white tabular-nums">${getVal("PT Overall Head").toLocaleString()}</span></div>
                        <div class="w-px h-16 bg-white/10 mx-4"></div>
                        <div class="flex flex-col items-center"><span class="mini-label text-indigo-400/80 mb-1">HEAD (Share)</span><span class="text-7xl font-black text-white tabular-nums">${getVal("PT Overall Share") || 0}</span></div>
                    </div>
                    <div class="grid grid-cols-4 gap-3">
                        ${[{l:"Book",v:getVal("PT Overall Book")},{l:"MTD Book",v:getVal("PT Overall MTD Book")},{l:"Show",v:getVal("PT Overall Show")},{l:"Amount",v:getVal("PT Overall $")}].map(s=>`
                            <div class="grid-item py-8 ${s.l==='Amount'?'bg-emerald-500/15':''}">
                                <span class="mini-label mb-3 text-slate-400 font-black text-sm">${s.l}</span>
                                <span class="text-4xl font-black ${s.l==='Amount'?'text-emerald-400':'text-white'} tabular-nums">${s.v.toLocaleString()}</span>
                            </div>`).join('')}
                    </div>
                </div>`;

            const bdayHtml = `
                <div class="glass-panel p-8 border-l-8 border-violet-500 shadow-2xl">
                    <div class="flex justify-between items-center mb-6 border-b border-white/10 pb-4">
                        <h4 class="text-2xl font-black uppercase italic text-violet-400">bday giftcard</h4>
                    </div>
                    <div class="flex justify-center items-center gap-16 mb-8">
                        <div class="flex flex-col items-center"><span class="mini-label text-violet-400/80 mb-1">HEAD (Entitled)</span><span class="text-7xl font-black text-white tabular-nums">${getVal("Bday Overall Head Ent").toLocaleString()}</span></div>
                        <div class="w-px h-16 bg-white/10 mx-4"></div>
                        <div class="flex flex-col items-center"><span class="mini-label text-violet-400/80 mb-1">HEAD (Redeemed)</span><span class="text-7xl font-black text-white tabular-nums">${getVal("Bday Overall Head Redm").toLocaleString()}</span></div>
                    </div>
                    <div class="grid grid-cols-4 gap-3">
                        ${[{l:"Book",v:getVal("Bday Overall Book")},{l:"Show",v:getVal("Bday Overall Show")},{l:"Sign",v:getVal("Bday Overall Sign")},{l:"Amount",v:getVal("Bday Overall $")}].map(s=>`
                            <div class="grid-item py-8 ${s.l==='Amount'?'bg-emerald-500/15':''}">
                                <span class="mini-label mb-3 text-slate-400 font-black text-sm">${s.l}</span>
                                <span class="text-4xl font-black ${s.l==='Amount'?'text-emerald-400':'text-white'} tabular-nums text-center">${s.v.toLocaleString()}</span>
                            </div>`).join('')}
                    </div>
                </div>`;
            container.innerHTML = ptHtml + bdayHtml;
        }

        function renderOperations(opsData) {
            const container = document.getElementById('ops-container');
            container.innerHTML = '';
            let brands = opsFilterBrand === 'All' ? preferredBrandOrder : [opsFilterBrand];

            brands.forEach(brand => {
                const brandColor = colors[brand.toLowerCase()] || colors.default;
                const brandData = opsData.filter(d => d.Brand === brand);
                if (!brandData.length) return;

                let brandHtml = `
                    <div class="space-y-2">
                        <div class="flex items-center gap-3 p-3 bg-${brandColor}-500/15 border border-${brandColor}-500/30 rounded-xl shadow-lg">
                            <h3 class="text-xl font-black uppercase tracking-[0.1em] text-${brandColor}-300">${brand} Network</h3>
                        </div>
                        <div class="glass-panel overflow-hidden border border-white/10">
                            <div class="overflow-x-auto">
                                <table class="w-full text-left kpi-table min-w-[1700px] table-fixed">
                                    <thead>
                                        <tr>
                                            <th rowspan="2" class="w-[160px] border-r border-slate-800 bg-slate-950/70">Location</th>
                                            <th rowspan="2" class="w-[100px] border-r border-slate-800 bg-slate-950/70 text-center">HC</th>
                                            <th class="w-[140px] border-b border-slate-800 text-emerald-400 uppercase font-black">Base</th>
                                            <th colspan="2" class="w-[320px] border-b border-slate-800 text-sky-400 uppercase tracking-widest">REPLICATION</th>
                                            <th colspan="4" class="w-[600px] border-b border-slate-800 text-rose-400 uppercase tracking-widest font-black text-center">ACTIVATION</th>
                                            <th class="w-[280px] border-b border-slate-800 text-indigo-400 italic font-black">Paid Trial</th>
                                            <th class="w-[280px] border-b border-slate-800 text-violet-400 italic font-black text-center">Birthday</th>
                                        </tr>
                                        <tr>
                                            <th class="border-r border-slate-800 italic text-center">A / I Ref</th>
                                            <th class="w-[160px] text-center">node (Δ)</th>
                                            <th class="w-[160px] bg-sky-500/10 font-black text-center">node /HC</th>
                                            <th class="w-[150px] text-center">Active traffic</th>
                                            <th class="w-[150px] bg-emerald-500/10 font-black text-center">Active Traffic/HC</th>
                                            <th class="w-[150px] text-center">Active purchase</th>
                                            <th class="w-[150px] border-r border-slate-800 bg-rose-500/10 font-black text-center">Active Purchase/HC</th>
                                            <th class="border-r border-slate-800 text-center font-black">Head (Ent/Share) / Tail</th>
                                            <th class="text-center font-black uppercase">Head (Ent/Red) / Tail</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-slate-800/60">`;

                brandData.forEach(d => {
                    const hc = parseSheetNum(d.HC);
                    const totalTrf = parseSheetNum(d.Traffic_Head) + parseSheetNum(d.Traffic_Tail);
                    const totalPur = parseSheetNum(d.Purchase_Head) + parseSheetNum(d.Purchase_Tail);
                    const ratio = hc > 0 ? (parseSheetNum(d.Nodes) / hc).toFixed(1) : '-';
                    const trfRatio = hc > 0 ? (totalTrf / hc).toFixed(1) : '-';
                    const purRatio = hc > 0 ? (totalPur / hc).toFixed(1) : '-';

                    brandHtml += `
                        <tr class="hover:bg-white/[0.05] transition-colors">
                            <td class="p-1.5 font-black text-slate-100 border-r border-slate-800 text-lg uppercase italic text-left pl-6">${d.Floor}</td>
                            <td class="p-1.5 text-slate-400 border-r border-slate-800 tabular-nums font-black text-4xl text-center">${hc > 0 ? hc.toLocaleString() : '-'}</td>
                            <td class="p-1.5 border-r border-slate-800"><div class="stacked-cell"><span class="text-sky-300 font-black text-lg">A: ${parseSheetNum(d.ACB_Ref).toLocaleString()}</span><span class="text-indigo-400 font-black text-lg">I: ${parseSheetNum(d.ICB_Ref).toLocaleString()}</span></div></td>
                            <td class="p-1.5 font-black data-value-lg mono text-white text-center">${parseSheetNum(d.Nodes).toLocaleString()} ${getBracketHtml(d.Nodes_Delta, 'text-lg')}</td>
                            <td class="p-1.5 text-sky-300 font-black data-value-xl bg-sky-500/10 text-center">${ratio}</td>
                            <td class="p-1.5"><div class="stacked-cell"><div class="flex justify-between w-full px-4 text-white text-2xl uppercase italic"><span>Head</span><span>${parseSheetNum(d.Traffic_Head).toLocaleString()}</span></div><div class="flex justify-between w-full px-4 text-emerald-400 text-2xl uppercase italic"><span>Tail</span><span>${parseSheetNum(d.Traffic_Tail).toLocaleString()}</span></div></div></td>
                            <td class="p-1.5 text-emerald-400 font-black data-value-xl bg-emerald-500/10 text-center">${trfRatio}</td>
                            <td class="p-1.5"><div class="stacked-cell"><div class="flex justify-between w-full px-4 text-white text-2xl uppercase italic"><span>Head</span><span>${parseSheetNum(d.Purchase_Head).toLocaleString()}</span></div><div class="flex justify-between w-full px-4 text-rose-400 text-2xl uppercase italic"><span>Tail</span><span>${parseSheetNum(d.Purchase_Tail).toLocaleString()}</span></div></div></td>
                            <td class="p-1.5 text-rose-400 font-black data-value-xl bg-rose-500/10 border-r border-slate-800 text-center">${purRatio}</td>
                            <td class="p-1 border-r border-slate-800 bg-indigo-500/[0.04]"><div class="stacked-cell text-center"><div class="flex justify-center items-center border-b border-white/10 pb-1 w-full gap-4"><div class="flex flex-col"><span class="mini-label text-indigo-400 text-[9px]">Ent</span><span class="font-black text-indigo-300 text-2xl">${d.PT_Eligible || '-'}</span></div><div class="flex flex-col"><span class="mini-label text-indigo-400 text-[9px]">Share</span><span class="font-black text-indigo-300 text-2xl">${d.PT_Share || 0}</span></div></div><div class="mini-grid px-1">${[{l:"Book",v:d.PT_Book},{l:"MTD",v:d.PT_MTD_Book},{l:"Show",v:d.PT_Show},{l:"$",v:d.PT_Amount}].map(x=>`<div class="grid-item"><span class="mini-label font-black text-[9px]">${x.l}</span><span class="font-black text-xl ${x.l==='$'?'text-emerald-400':''}">${x.v || '-'}</span></div>`).join('')}</div></div></td>
                            <td class="p-1 bg-violet-500/[0.04]"><div class="stacked-cell text-center"><div class="flex justify-between border-b border-white/10 pb-1 px-1 w-full"><div class="flex flex-col items-center"><span class="mini-label text-violet-400 text-[9px]">Entitled</span><span class="text-violet-300 font-black text-2xl text-center">${d.Bday_Eligible || '-'}</span></div><div class="flex flex-col items-center"><span class="mini-label text-violet-400 text-[9px]">Redeemed</span><span class="text-violet-400 font-black text-2xl text-center">${d.Bday_Redeem || '-'}</span></div></div><div class="mini-grid px-1">${[{l:"Book",v:d.Bday_Book},{l:"Show",v:d.Bday_Show},{l:"Sign",v:d.Bday_Sign},{l:"Amount",v:d.Bday_Amount}].map(x=>`<div class="grid-item"><span class="mini-label font-black text-[9px]">${x.l}</span><span class="font-black text-xl ${x.l==='Amount'?'text-emerald-400':''}">${x.v || '-'}</span></div>`).join('')}</div></div></td>
                        </tr>`;
                });
                container.innerHTML += brandHtml + `</tbody></table></div></div></div>`;
            });
        }

        function renderTherapists(tData) {
            const container = document.getElementById('therapist-container');
            const floorContainer = document.getElementById('floor-filter-container');
            
            if (!tData || tData.length === 0) {
                container.innerHTML = `<div class="p-16 text-center glass-panel border border-white/10 text-slate-500 font-black uppercase tracking-widest italic text-xl">Waiting for "Therapists" tab data...</div>`;
                return;
            }

            // 1. Get Floors for current brand
            const uniqueFloors = [...new Set(tData.filter(t => t.Brand === therapistFilterBrand).map(t => t.Floor))].sort();
            
            // 2. Default to one floor first if null
            if (!therapistFilterFloor && uniqueFloors.length > 0) {
                therapistFilterFloor = uniqueFloors[0];
            }

            // 3. Render Floor Filters
            floorContainer.innerHTML = uniqueFloors.map(f => `
                <button onclick="setTherapistFloor('${f}')" 
                        class="floor-tab px-4 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase tracking-widest ${f === therapistFilterFloor ? 'active' : 'bg-white/5'}">
                    ${f}
                </button>
            `).join('');

            // 4. Filter and Render Rows
            const filteredData = tData.filter(t => t.Brand === therapistFilterBrand && t.Floor === therapistFilterFloor);
            const brandColor = colors[therapistFilterBrand.toLowerCase()] || colors.default;

            container.innerHTML = `
                <div class="glass-panel border-l-4 border-${brandColor}-500/50 overflow-hidden shadow-2xl">
                    <div class="bg-white/5 px-6 py-3 flex justify-between items-center border-b border-white/10">
                        <span class="text-lg font-black uppercase italic tracking-widest text-${brandColor}-300">${therapistFilterBrand} &bull; ${therapistFilterFloor}</span>
                        <span class="text-[11px] font-black text-slate-500 uppercase tracking-tighter">${filteredData.length} Active Node Identities</span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left kpi-table min-w-[1850px] table-fixed">
                            <thead>
                                <tr class="text-[12px] font-black text-slate-400 uppercase border-b border-white/5 bg-slate-900/40">
                                    <th class="p-3 pl-8 w-[250px] text-left">Identity (Therapist)</th>
                                    <th class="p-3 text-center w-[160px]">Nodes (Δ)</th>
                                    <th class="p-3 text-center w-[230px] text-emerald-400 uppercase tracking-wider">Active Traffic [Head/Tail]</th>
                                    <th class="p-3 text-center w-[230px] text-rose-400 uppercase tracking-wider">Active Purchase [Head/Tail]</th>
                                    <th class="p-3 text-center w-[300px] text-indigo-400 uppercase italic">Paid Trial (Head/Tail)</th>
                                    <th class="p-3 text-center w-[300px] text-violet-400 uppercase italic">Birthday (Head/Tail)</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-white/[0.03]">
                                ${filteredData.map(t => {
                                    const nVal = parseSheetNum(t.Nodes);
                                    const nDelta = parseSheetNum(t.Nodes_Delta);
                                    return `
                                    <tr class="hover:bg-white/[0.06] transition-colors">
                                        <td class="p-3 pl-8 font-black text-slate-200 uppercase italic text-2xl text-left">${t.Therapist}</td>
                                        <td class="p-3 text-center font-black text-white text-4xl tabular-nums">
                                            ${nVal.toLocaleString()} 
                                            <span class="text-lg ${nDelta >= 0 ? 'text-emerald-500' : 'text-rose-500'} font-black italic">(${nDelta >= 0 ? '+' : ''}${nDelta})</span>
                                        </td>
                                        <td class="p-3 text-center">
                                            <div class="stacked-cell font-black">
                                                <div class="flex justify-between w-full px-6 text-white text-3xl uppercase italic"><span>Head</span><span>${parseSheetNum(t.Traffic_Head)}</span></div>
                                                <div class="flex justify-between w-full px-6 text-emerald-400 text-3xl uppercase italic"><span>Tail</span><span>${parseSheetNum(t.Traffic_Tail)}</span></div>
                                            </div>
                                        </td>
                                        <td class="p-3 text-center">
                                            <div class="stacked-cell font-black">
                                                <div class="flex justify-between w-full px-6 text-white text-3xl uppercase italic"><span>Head</span><span>${parseSheetNum(t.Purchase_Head)}</span></div>
                                                <div class="flex justify-between w-full px-6 text-rose-400 text-3xl uppercase italic"><span>Tail</span><span>${parseSheetNum(t.Purchase_Tail)}</span></div>
                                            </div>
                                        </td>
                                        <td class="p-2 border-l border-white/5 bg-indigo-500/[0.02]">
                                            <div class="flex items-center gap-6 px-2 justify-center font-black">
                                                <div class="flex flex-col items-center justify-center text-center">
                                                    <div class="flex flex-col"><span class="mini-label text-[10px] text-indigo-400">Entitled</span><span class="text-indigo-300 text-3xl tabular-nums">${t.PT_Eligible || '-'}</span></div>
                                                    <div class="flex flex-col mt-2"><span class="mini-label text-[10px] text-indigo-400">Share</span><span class="text-indigo-300 text-3xl tabular-nums">${t.PT_Share || 0}</span></div>
                                                </div>
                                                <div class="mini-grid grid-cols-4 flex-1">
                                                    ${[{l:"Book",v:t.PT_Book},{l:"MTD",v:t.PT_MTD_Book},{l:"Show",v:t.PT_Show},{l:"$",v:t.PT_Amount}].map(x=>`<div class="grid-item"><span class="mini-label text-[11px] font-black uppercase">${x.l}</span><span class="font-black text-2xl ${x.l==='$'?'text-emerald-400':''} text-center tabular-nums">${x.v || '-'}</span></div>`).join('')}
                                                </div>
                                            </div>
                                        </td>
                                        <td class="p-2 border-l border-white/5 bg-violet-500/[0.02]">
                                            <div class="flex items-center gap-6 px-2 justify-center font-black">
                                                <div class="flex flex-col items-center justify-center text-center">
                                                    <div class="flex flex-col mb-2"><span class="mini-label text-[10px] text-violet-400 uppercase">Entitled</span><span class="text-violet-300 text-2xl tabular-nums">${t.Bday_Eligible || '0'}</span></div>
                                                    <div class="flex flex-col"><span class="mini-label text-[10px] text-violet-500 uppercase">Redeemed</span><span class="text-violet-400 text-2xl tabular-nums">${t.Bday_Redeem || '0'}</span></div>
                                                </div>
                                                <div class="mini-grid grid-cols-4 flex-1">
                                                    ${[{l:"Book",v:t.Bday_Book},{l:"Show",v:t.Bday_Show},{l:"Sign",v:t.Bday_Sign},{l:"Amount",v:t.Bday_Amount}].map(x=>`<div class="grid-item"><span class="mini-label text-[11px] font-black uppercase">${x.l}</span><span class="font-black text-2xl ${x.l==='Amount'?'text-emerald-400':''} text-center tabular-nums">${x.v || '-'}</span></div>`).join('')}
                                                </div>
                                            </div>
                                        </td>
                                    </tr>`;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>`;
        }

        window.onload = () => { if (window.initDashboard) window.initDashboard(); setInterval(() => { const timeEl = document.getElementById('current-time'); if (timeEl) timeEl.innerText = new Date().toLocaleString(); }, 1000); };
    </script>
</body>
</html>
