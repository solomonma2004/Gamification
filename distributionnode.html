
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node Momentum Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        let auth;

        try {
            const firebaseConfig = JSON.parse(__firebase_config);
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
        } catch (e) {
            console.error("Firebase Configuration Missing or Invalid:", e);
        }

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) {
                console.error("Authentication Service Unavailable:", e);
            }
        };

        window.initDashboard = async () => {
            await initAuth();
            fetchData();
        };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; background-color: #020617; color: #f8fafc; font-size: 0.95rem; overflow-x: hidden; }
        .glass-panel { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 0.75rem; }
        .stat-card { transition: transform 0.2s ease; }
        .stat-card:hover { transform: translateY(-2px); }
        
        .kpi-table th { font-size: 10px; letter-spacing: 0.05em; color: #cbd5e1; text-transform: uppercase; padding: 12px 4px; border: 1px solid #1e293b; line-height: 1.2; text-align: center; background: rgba(15, 23, 42, 0.95); font-weight: 900; }
        .kpi-table td { padding: 8px 4px; border: 1px solid rgba(30, 41, 59, 0.5); text-align: center; vertical-align: middle; }
        
        .mini-label { font-size: 9px; color: #cbd5e1; text-transform: uppercase; font-weight: 900; line-height: 1.1; text-align: center; white-space: nowrap; letter-spacing: 0.01em; opacity: 0.95; }
        .grid-item { background: rgba(255, 255, 255, 0.08); padding: 6px 2px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; min-height: 52px; }
        
        .filter-tab { transition: all 0.2s ease; cursor: pointer; border: 1px solid transparent; }
        .filter-tab.active { background: rgba(168, 85, 247, 0.4); border-color: rgba(168, 85, 247, 0.6); color: #fff; }

        .network-btn { padding: 4px 16px; border-radius: 100px; font-size: 12px; font-weight: 900; text-transform: uppercase; color: #64748b; transition: 0.2s; }
        .network-btn.active { background: white; color: #020617; }
        .network-btn.active.sh { background: #10b981; color: white; }

        .section-tag { font-size: 10px; font-weight: 900; padding: 4px 6px; border-radius: 3px; display: inline-block; line-height: 1; text-align: center; min-width: 32px; }
        .head-tag { background: rgba(56, 189, 248, 0.2); color: #38bdf8; border: 1px solid rgba(56, 189, 248, 0.3); }
        .tail-tag { background: rgba(168, 85, 247, 0.2); color: #a855f7; border: 1px solid rgba(168, 85, 247, 0.3); }

        .section-label { font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em; color: #94a3b8; display: flex; align-items: center; gap: 8px; width: 100%; }
        .section-label::before, .section-label::after { content: ""; height: 1px; flex-grow: 1; background: rgba(255,255,255,0.1); }
        
        .sort-header { cursor: pointer; transition: background 0.2s ease; position: relative; }
        .sort-header:hover { background: rgba(255, 255, 255, 0.08) !important; }
        .sort-indicator { font-size: 10px; margin-left: 4px; opacity: 0.4; }
        .sort-active { color: #38bdf8 !important; }
        .sort-active .sort-indicator { opacity: 1; color: #38bdf8; }

        .metric-container { position: relative; overflow: hidden; border-radius: 0.75rem; }
    </style>
</head>
<body class="p-2 md:p-4">

    <!-- THERAPIST PERFORMANCE -->
    <section class="mb-24">
        <div class="flex flex-col gap-4 mb-4">
            <div class="flex items-center gap-2">
                <h2 class="text-lg font-black text-sky-400 tracking-tighter uppercase italic">Therapist Performance 個人表現分析</h2>
                <div class="h-px flex-1 bg-sky-900/30"></div>
            </div>
            <div class="flex flex-col md:flex-row gap-4 items-center">
                <div id="t-brand-filter-container" class="flex items-center glass-panel p-0.5 border-white/10 overflow-hidden scale-90"></div>
                <div id="floor-filter-container" class="flex flex-wrap items-center gap-1.5"></div>
                <div id="t-pt-filter-container" class="flex items-center glass-panel p-0.5 border-white/10 overflow-hidden scale-90"></div>
            </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbx6p2bq7JCEl8RsfenZZ6ZCvYyNt1VK6aly_03FFLdMmV2Lw_9e3A6u7mSUVEHKp_L3eA/exec";
        const colors = { dermes: 'sky', elyze: 'emerald', reenex: 'rose', evvus: 'indigo', default: 'slate' };
        
        let lastData = null;
        let networkMode = 'HK';
        let opsFilterBrand = null;
        let opsPTFilter = 'Overall'; 
        let therapistFilterBrand = null;
        let therapistFilterFloor = null; 
        let therapistPTFilter = 'Overall';
        let bdayFilter = 'Overall'; 
        let ptFilter = 'Overall'; 

        let opsSort = { key: null, direction: 'desc' };
        let therapistSort = { key: null, direction: 'desc' };

        const labels = {
            entitled: "符合資格 Entitled",
            traffic: "流量 Traffic",
            share: "分享 Share",
            redeem: "換領 Redeem",
            book: "預約 Book",
            mtd: "已到期之預約 MTD Book",
            show: "出席 Show",
            sign: "簽約 Sign",
            amount: "金額 Amount",
            hc: "人數 HC",
            nodes: "節點 Nodes",
            purchase: "購買 Purchase",
            base: "客底 Base",
            pt_track: "付費體驗 giftcard",
            bday_track: "生日 giftcard",
            head: "龍頭 HEAD",
            tail: "龍尾 TAIL"
        };

        // Utility: Robust string normalization (removes spaces, underscores, casing)
        function normalizeKey(str) {
            return String(str || '').toLowerCase().replace(/[^a-z0-9]/g, '');
        }

        // Utility: Highly Resilient Property Retrieval (Handles missing prefixes and aliases)
        function getSafeVal(obj, key) {
            if (!obj || !key) return undefined;
            const normKey = normalizeKey(key);
            
            let foundKey = Object.keys(obj).find(k => normalizeKey(k) === normKey);
            if (!foundKey && normKey.startsWith('pt')) foundKey = Object.keys(obj).find(k => normalizeKey(k) === normKey.substring(2));
            if (!foundKey && normKey.startsWith('bday')) foundKey = Object.keys(obj).find(k => normalizeKey(k) === normKey.substring(4));
            
            if (foundKey) return obj[foundKey];

            // Alias check (Eligible <-> Entitled)
            const altKey = normKey.includes('eligible') ? normKey.replace('eligible', 'entitled') : normKey.replace('entitled', 'eligible');
            foundKey = Object.keys(obj).find(k => normalizeKey(k) === altKey);
            if (!foundKey && altKey.startsWith('pt')) foundKey = Object.keys(obj).find(k => normalizeKey(k) === altKey.substring(2));
            
            if (foundKey) return obj[foundKey];

            // Deep Fuzzy Match (e.g. "PT Pexo Eligible" matches "PEXO Entitled")
            const keywords = key.toLowerCase().split('_').filter(k => k && k !== 'pt' && k !== 'bday');
            const hasHead = keywords.includes('head');
            const hasTail = keywords.includes('tail');

            foundKey = Object.keys(obj).find(k => {
                const nk = normalizeKey(k);
                if (hasHead && !nk.includes('head')) return false;
                if (hasTail && !nk.includes('tail')) return false;
                if (!hasHead && !hasTail && (nk.includes('head') || nk.includes('tail'))) return false;

                return keywords.every(kw => {
                    if (kw === 'head' || kw === 'tail') return true;
                    if (kw === 'eligible' && nk.includes('entitled')) return true;
                    if (kw === 'entitled' && nk.includes('eligible')) return true;
                    return nk.includes(kw);
                });
            });

            return foundKey ? obj[foundKey] : undefined;
        }

        function parseSheetNum(val) {
            if (typeof val === 'number') return val;
            if (!val) return 0;
            const cleaned = val.toString().replace(/,/g, '').replace(/[^\d.-]/g, '');
            if (cleaned === '') return 0;
            return parseFloat(cleaned) || 0;
        }

        function getBracketHtml(val) {
            const num = parseSheetNum(val);
            const colorClass = num >= 0 ? 'text-emerald-500' : 'text-rose-500';
            const sign = num >= 0 ? '+' : '';
            return `<span class="${colorClass} text-xs font-black italic">(${sign}${num})</span>`;
        }

        function setNetworkMode(mode) {
            networkMode = mode;
            document.querySelectorAll('.network-btn').forEach(btn => {
                btn.classList.remove('active', 'sh');
                if (btn.id === `net-btn-${mode}`) {
                    btn.classList.add('active');
                    if (mode === 'SH') btn.classList.add('sh');
                }
            });
            opsFilterBrand = null; 
            therapistFilterBrand = null;
            therapistFilterFloor = null;
            opsSort = { key: null, direction: 'desc' };
            therapistSort = { key: null, direction: 'desc' };
            ptFilter = 'Overall';
            bdayFilter = 'Overall';
            if (lastData) updateDashboard(lastData);
        }

        // Strictly explicitly target the gift card slice to avoid contamination
        function setBdayFilter(type) { bdayFilter = type; if (lastData) renderMKTPillars(getSlice(lastData, 'gift_card')); }
        function setPTFilter(type) { ptFilter = type; if (lastData) renderMKTPillars(getSlice(lastData, 'gift_card')); }

        function handleSort(type, key) {
            const sortRef = type === 'ops' ? opsSort : therapistSort;
            if (sortRef.key === key) { 
                sortRef.direction = sortRef.direction === 'asc' ? 'desc' : 'asc'; 
            } else { 
                sortRef.key = key; 
                sortRef.direction = 'desc'; 
            }
            if (type === 'ops') {
                renderOperations(getSlice(lastData, 'operations'));
            } else {
                renderTherapists(getSlice(lastData, 'therapists'));
            }
        }

        function getSortData(data, config) {
            if (!config.key) return data;
            return [...data].sort((a, b) => {
                let valA, valB;
                if (config.key.includes('Total')) {
                    const hK = config.key.replace('Total_','Head');
                    const tK = config.key.replace('Total_','Tail');
                    valA = parseSheetNum(a[hK]) + parseSheetNum(a[tK]);
                    valB = parseSheetNum(b[hK]) + parseSheetNum(b[tK]);
                } else {
                    valA = a[config.key];
                    valB = b[config.key];
                }
                const nA = parseSheetNum(valA);
                const nB = parseSheetNum(valB);
                const isNumA = (typeof valA === 'number') || (typeof valA === 'string' && valA.trim() !== '' && !isNaN(valA.replace(/,/g, '')));
                const isNumB = (typeof valB === 'number') || (typeof valB === 'string' && valB.trim() !== '' && !isNaN(valB.replace(/,/g, '')));
                if (isNumA && isNumB) {
                    if (nA === nB) return 0;
                    return config.direction === 'asc' ? nA - nB : nB - nA;
                } else {
                    const sA = String(valA || "").toLowerCase();
                    const sB = String(valB || "").toLowerCase();
                    if (sA < sB) return config.direction === 'asc' ? -1 : 1;
                    if (sA > sB) return config.direction === 'asc' ? 1 : -1;
                    return 0;
                }
            });
        }

        function getSortIcon(currentKey, key, direction) {
            if (currentKey !== key) return '<span class="sort-indicator">↕</span>';
            return direction === 'asc' ? '<span class="sort-indicator">↑</span>' : '<span class="sort-indicator">↓</span>';
        }

        // Segregates the array data strictly depending on context requested
        function getSlice(data, type) {
            const prefix = networkMode === 'SH' ? 'SH_' : '';
            if (type === 'overview') {
                return data[prefix + 'overview'] || data['overview'] || [];
            }
            if (type === 'gift_card') {
                if (networkMode === 'SH') {
                    // Force SH to only look at SH Overview for MKT pillars
                    return data['SH_overview'] || data['SH Overview'] || data['SH_Overview'] || [];
                } else {
                    // HK Mode: Focus explicitly on Gift Card Overview
                    return [
                        ...(data['Gift Card Overview'] || []),
                        ...(data['gift_card_overview'] || []),
                        ...(data['Gift_Card_Overview'] || []),
                        ...(data['overview'] || [])
                    ];
                }
            }
            if (type === 'operations') return data[prefix + 'operations'] || data['operations'] || [];
            if (type === 'therapists') return data[prefix + 'Therapists'] || data[prefix + 'therapists'] || data['Therapists'] || data['therapists'] || [];
            if (type === 'raw') return data['gift_card_raw'] || [];
            return [];
        }

        function setOpsBrandFilter(brand) { opsFilterBrand = brand; if (lastData) renderOperations(getSlice(lastData, 'operations')); }
        function setOpsPTFilter(type) { opsPTFilter = type; if (lastData) renderOperations(getSlice(lastData, 'operations')); }
        function setTherapistBrand(brand) { therapistFilterBrand = brand; therapistFilterFloor = null; if (lastData) renderTherapists(getSlice(lastData, 'therapists')); }
        function setTherapistFloor(floor) { therapistFilterFloor = floor; if (lastData) renderTherapists(getSlice(lastData, 'therapists')); }
        function setTherapistPTFilter(type) { therapistPTFilter = type; if (lastData) renderTherapists(getSlice(lastData, 'therapists')); }

        function openLeadModal(brand, floor, therapist, type, track) {
            const modal = document.getElementById('lead-modal');
            const thead = document.getElementById('lead-modal-thead');
            const tbody = document.getElementById('lead-modal-body');
            const titleEl = document.getElementById('modal-therapist-name');
            const brandEl = document.getElementById('modal-brand-name');
            const centerEl = document.getElementById('modal-center-name');
            const trackEl = document.getElementById('modal-track-name');
            const emptyEl = document.getElementById('modal-empty-state');
            const countEl = document.getElementById('modal-count');

            titleEl.innerText = therapist || 'CENTER HUB (中心總覽)';
            brandEl.innerText = brand;
            centerEl.innerText = floor;
            trackEl.innerText = (track === 'Bday' ? '生日禮券 BDAY TRACK' : '付費體驗禮券 PT TRACK');
            
            if (track === 'Bday') {
                thead.innerHTML = `
                    <tr class="text-[10px] font-black text-slate-500 uppercase tracking-widest">
                        <th class="p-3 pl-6">MMC CODE 唯代碼</th>
                        <th class="p-3 text-center">BDAY MONTH 生日月份</th>
                        <th class="p-3 text-center">SEGMENT 類別</th>
                        <th class="p-3 text-center">龍頭 STATUS (HEAD)</th>
                        <th class="p-3 text-center">龍尾 STATUS (TAIL)</th>
                    </tr>`;
            } else {
                thead.innerHTML = `
                    <tr class="text-[10px] font-black text-slate-500 uppercase tracking-widest">
                        <th class="p-3 pl-6">MMC CODE 唯代碼</th>
                        <th class="p-3 text-center">TECH 技術</th>
                        <th class="p-3 text-center">SEGMENT 類別</th>
                        <th class="p-3 text-center">STATUS 狀態</th>
                    </tr>`;
            }

            tbody.innerHTML = '';
            const rawData = getSlice(lastData, 'raw');
            
            let leads = rawData.filter(d => {
                const bM = String(d.Brand || '').toLowerCase() === String(brand).toLowerCase();
                const targetFloor = String(floor).toLowerCase();
                const sheetFloor = String(d.Center || '').toLowerCase();
                const cM = (floor === 'All') ? true : (sheetFloor.includes(targetFloor) || targetFloor.includes(sheetFloor));
                
                let tM = true;
                if (therapist) {
                    const targetTherapist = String(therapist).toLowerCase();
                    const sheetTherapist = String(d.Therapist || '').toLowerCase();
                    tM = sheetTherapist.includes(targetTherapist) || targetTherapist.includes(sheetTherapist);
                }
                
                const giftType = String(d.gift_card_type || '').toUpperCase();
                const isBdayData = giftType.includes('BDAY') || giftType.includes('生日');
                const isMatchTrack = (track === 'Bday' ? isBdayData : !isBdayData);

                return bM && cM && tM && isMatchTrack;
            });
            
            if (type === 'Shared') { leads = leads.filter(d => d.click_share_dt && String(d.click_share_dt).trim() !== ''); }

            if (leads.length === 0) {
                emptyEl.classList.remove('hidden');
                countEl.innerText = `0 Records Found`;
            } else {
                emptyEl.classList.add('hidden');
                countEl.innerText = `${leads.length} Active Records`;
                
                leads.forEach(l => {
                    if (track === 'Bday') {
                        const hStatus = l.head_book_dt ? 'Booked 已預約' : (l.head_redeem_dt ? 'Redeemed 已換領' : '---');
                        const tStatus = l.tail_book_dt ? 'Booked 已預約' : (l.tail_redeem_dt ? 'Redeemed 已換領' : '---');
                        
                        const getStatusBadge = (s) => {
                           if (s.includes('Booked')) return `<span class="px-2 py-0.5 bg-emerald-500/10 text-emerald-400 text-[9px] font-black uppercase rounded border border-emerald-500/20">Booked</span>`;
                           if (s.includes('Redeemed')) return `<span class="px-2 py-0.5 bg-sky-500/10 text-sky-400 text-[9px] font-black uppercase rounded border border-sky-500/20">Redeemed</span>`;
                           return `<span class="text-slate-600 text-[10px] font-black uppercase">---</span>`;
                        };

                        tbody.innerHTML += `
                            <tr class="lead-row hover:bg-white/5 transition-colors">
                                <td class="p-3 pl-6 font-mono text-sm text-sky-100">${l.mmc_code || '---'}</td>

        async function fetchData() {
            setSyncStatus(true);
            const overlay = document.getElementById('loading-overlay');
            try {
                // 加入明確的 GET 與 redirect 參數，防止在某些環境下產生的預設跨域攔截
                const res = await fetch(`${API_URL}?t=${Date.now()}`, {
                    method: 'GET',
                    redirect: 'follow'
                });
                
                if (!res.ok) throw new Error(`HTTP Error: ${res.status}`);
                const data = await res.json();
                lastData = data;
                updateDashboard(data);
                overlay.style.opacity = '0';
                setTimeout(() => overlay.style.display = 'none', 500);
            } catch (error) {
                console.error("Fetch Error:", error);
                overlay.innerHTML = `
                    <div class="glass-panel p-8 text-left max-w-lg border border-rose-500/30 shadow-2xl relative overflow-hidden">

                            <p class="text-slate-300 text-sm leading-relaxed mb-2 font-semibold">這個錯誤通常是因為 Google Apps Script 的權限設定問題所引起 (CORS 阻擋)。</p>
                            <div class="mt-4 p-3 bg-sky-900/30 border border-sky-500/30 rounded">

                                <ol class="list-decimal list-inside text-slate-300 text-[11px] space-y-1">

        async function renderOverview(overviewData) {
            const container = document.getElementById('overview-container');
            container.innerHTML = '';
            
            const getVal = (k) => {
                const normK = normalizeKey(k);
                if (!Array.isArray(overviewData)) return 0;
                
                for (const row of overviewData) {
                    if (!row) continue;
                    if (Array.isArray(row) && row.length >= 2) {
                        if (normalizeKey(row[0]) === normK) return parseSheetNum(row[1]);
                    } else if (typeof row === 'object') {
                        if (row.Metric && normalizeKey(row.Metric) === normK) return parseSheetNum(row.Total);
                        if (row.A && normalizeKey(row.A) === normK) return parseSheetNum(row.B);
                        for (const [key, v] of Object.entries(row)) {
                            if (normalizeKey(key) === normK) return parseSheetNum(v);
                        }
                    }
                }
                return 0;
            };

            const rep = { val: getVal("Nodes"), delta: getVal("Nodes_Delta"), border: 'border-l-sky-500', label: 'Nodes 節點總量' };
            const act = [
                { val: getVal("Traffic"), delta: getVal("Traffic_Delta"), border: 'border-l-emerald-500', label: 'Active Traffic 活化流量', head: getVal("Traffic_Head"), tail: getVal("Traffic_Tail") },
                { val: getVal("Purchase"), delta: getVal("Purchase_Delta"), border: 'border-l-rose-500', label: 'Active Purchase 活化購買', head: getVal("Purchase_Head"), tail: getVal("Purchase_Tail") }
            ];
            let h = `<div class="grid grid-cols-1 lg:grid-cols-3 gap-4"><div class="glass-panel p-4 stat-card border-l-4 ${rep.border} text-center"><span class="text-slate-500 text-[11px] font-black uppercase mb-1 block">${rep.label}</span><span class="text-5xl font-black block">${rep.val.toLocaleString()}</span><div class="mt-2">${getBracketHtml(rep.delta)}</div></div>`;
            act.forEach(e => {
                h += `<div class="glass-panel p-4 stat-card border-l-4 ${e.border} text-center"><span class="text-slate-500 text-[11px] font-black uppercase mb-1 block">${e.label}</span><span class="text-5xl font-black block">${e.val.toLocaleString()}</span><div class="mt-2 mb-3">${getBracketHtml(e.delta)}</div><div class="grid grid-cols-2 gap-4 border-t border-white/5 pt-3"><div class="text-center"><span class="mini-label">${labels.head}</span><div class="font-black text-white text-2xl">${(e.head || 0).toLocaleString()}</div></div><div class="text-center"><span class="mini-label">${labels.tail}</span><div class="font-black text-white text-2xl">${(e.tail || 0).toLocaleString()}</div></div></div></div>`;
            });
            container.innerHTML = h + `</div>`;
        }

        function renderMKTPillars(giftCardData) {
            const container = document.getElementById('mkt-pillar-container');
            container.innerHTML = '';
            
            // STRICTLY scans only the Gift Card / MKT Pillar specific slice. Removed cross-tab searching.
            const getVal = (m) => {
                const normM = normalizeKey(m);
                const altM = normM.includes('eligible') ? normM.replace('eligible', 'entitled') : normM.replace('entitled', 'eligible');
                const keysToTry = [
                    normM, 
                    normM.startsWith('pt') ? normM.substring(2) : normM,
                    altM,
                    altM.startsWith('pt') ? altM.substring(2) : altM
                ];
                
                if (!Array.isArray(giftCardData)) return 0;
                
                for (const row of giftCardData) {
                    if (!row) continue;
                    
                    // Directly matching Column A & B pattern
                    if (Array.isArray(row) && row.length >= 2) {
                        if (typeof row[0] === 'string' && keysToTry.includes(normalizeKey(row[0]))) return parseSheetNum(row[1]);
                    } 
                    // Matching structured objects like { "A": "PT_Pexo_Eligible", "B": 2449 }
                    else if (typeof row === 'object') {
                        if (row.A && typeof row.A === 'string' && keysToTry.includes(normalizeKey(row.A))) return parseSheetNum(row.B);
                        if (row.Metric && typeof row.Metric === 'string' && keysToTry.includes(normalizeKey(row.Metric))) return parseSheetNum(row.Total);
                        if (row.Key && typeof row.Key === 'string' && keysToTry.includes(normalizeKey(row.Key))) return parseSheetNum(row.Value);
                        
                        // Checking flat format { "PT_Pexo_Eligible": 2449 }
                        for (const [k, v] of Object.entries(row)) {
                            if (keysToTry.includes(normalizeKey(k))) return parseSheetNum(v);
                        }

                        // Deep check values if headers are mapped incorrectly by JSON API
                        const vals = Object.values(row);
                        const keyIndex = vals.findIndex(v => typeof v === 'string' && keysToTry.includes(normalizeKey(v)));
                        if (keyIndex !== -1) {
                            if (row.Total !== undefined) return parseSheetNum(row.Total);
                            if (row.B !== undefined) return parseSheetNum(row.B);
                            if (row.Value !== undefined) return parseSheetNum(row.Value);
                            for (let i = 0; i < vals.length; i++) {
                                if (i === keyIndex) continue;
                                const val = vals[i];
                                if (typeof val === 'number') return val;
                                if (typeof val === 'string' && val.trim() !== '' && !isNaN(parseFloat(val.replace(/,/g, '')))) return parseSheetNum(val);
                            }
                        }
                    }
                }
                
                return 0; // If exact key isn't in Gift Card tab, it will return 0 safely

            const renderPTBlock = (optionType, color) => {

                        <div class="flex items-center glass-panel p-1 border-white/10 scale-95 origin-right">
                            ${ptOptions.map(f => `<button onclick="setPTFilter('${f}')" class="filter-tab px-4 py-2 rounded-lg text-[10px] font-black uppercase ${ptFilter === f ? 'active' : ''}">${f}</button>`).join('')}

                                <div class="metric-container text-center">
                                    <span class="mini-label text-base">符合資格 Entitled</span>

                            </div>
                        </div>
                        <div>
                            <div class="section-label mb-6">龍尾部分 (TAIL SECTION)</div>
                            <div class="grid grid-cols-6 gap-3">
                                ${[
								{l:"換領 Redeem",v:getVal(prefix+"Redeem")},

								{l:"已到期之預約 MTD",v:getVal(prefix+"MTD_Book")},

                </div>`;
            };

            const renderBdaySplitBlock = (optionType, color) => {
                // Bday 分析的 Overall 選項保持為 Bday_，這樣就能成功對接到 Bday_xxxx_Tail / Head
                const prefix = `Bday_${optionType === 'Overall' ? '' : optionType+'_'}`;

                const bdayOptions = ['Overall', 'PN', 'BBL'];

                const getMetric = (l, m, is$, isLg) => `
                <div class="metric-container flex-1">
                    <div class="text-center bg-slate-950/40 p-4 rounded-xl border border-white/5 min-w-[125px] h-full ${is$ ? 'bg-emerald-500/10' : ''}">
                    <span class="mini-label ${isLg ? 'text-sm mb-2' : 'mb-1'} block">${l}</span>
                    <div class="${isLg ? 'text-5xl' : 'text-2xl'} font-black ${is$ ? 'text-emerald-400' : 'text-white'} leading-none">${getVal(prefix+m)}</div>
                    <div class="flex justify-center gap-3 mt-2 opacity-60 text-[9px] font-bold"><span>ACB:${getVal(prefix+m+" (ACB)")}</span><span class="w-px h-2 bg-white/10"></span><span>ICB:${getVal(prefix+m+" (ICB)")}</span></div>
                    </div>
                </div>`;
                
                return `
                <div class="glass-panel p-8 border-l-8 border-${color}-500 bg-slate-900/20 h-full flex flex-col">
                    <div class="flex justify-between items-center mb-8 border-b border-white/10 pb-4">
                        <div class="flex flex-col"><h4 class="text-2xl font-black italic text-${color}-400 uppercase">生日活動分析 (BIRTHDAY ANALYSIS)</h4><p class="text-[10px] font-black text-slate-400 uppercase mt-1">Viewing: ${optionType}</p></div>
                        <div class="flex items-center glass-panel p-1 border-white/10 scale-95 origin-right">

                        </div>
                    </div>
                    <div class="relative flex-1">
                        <div class="mb-8">
                            <div class="section-label mb-6">龍頭部分 (HEAD SECTION)</div>
                            <div class="flex flex-wrap gap-2">
                                ${getMetric(labels.entitled, "Eligible", false, true)}
                                ${getMetric(labels.traffic, "Traffic", false, true)}
                                ${getMetric(labels.share, "Share", false, true)}
                                ${getMetric(labels.redeem, "Redeem_Head", false, true)}

                                ${getMetric(labels.sign, "Sign_Head")}
                                ${getMetric(labels.amount, "Amount_Head", true)}

                            <div class="flex flex-wrap gap-2">
                                ${[{l:labels.redeem,m:"Redeem_Tail"},{l:labels.book,m:"Book_Tail"},{l:labels.mtd,m:"MTD_Book_Tail"},{l:labels.show,m:"Show_Tail"},{l:labels.sign,m:"Sign_Tail"},{l:labels.amount,m:"Amount_Tail",is$:true}].map(s=> getMetric(s.l, s.m, s.is$)).join('')}

                if (!data.length) return;
                const getTh = (l, k, w) => `<th class="sort-header ${opsSort.key === k ? 'sort-active' : ''}" style="width: ${w};" onclick="handleSort('ops', '${k}')">${l}${getSortIcon(opsSort.key, k, opsSort.direction)}</th>`;
                let h = `<div class="space-y-2"><div class="flex items-center gap-3 p-2 bg-${color}-500/10 border border-${color}-500/20 rounded-lg"><div class="w-1.5 h-4 rounded-full bg-${color}-500"></div><h3 class="text-sm font-black uppercase text-${color}-300 tracking-widest">${brand} HUB 營運樞紐</h3></div><div class="glass-panel overflow-hidden border border-white/5"><div class="overflow-x-auto"><table class="w-full text-left kpi-table min-w-[1700px] table-fixed"><thead><tr>${getTh('位置 Location', 'Floor', '140px')}${getTh(labels.hc, 'HC', '75px')}${getTh('客底 Base', 'ACB_Ref', '100px')}<th colspan="2">REPLICATION</th><th colspan="4">ACTIVATION</th><th class="w-[360px]">${labels.pt_track}</th><th class="w-[450px]">${labels.bday_track}</th></tr><tr class="bg-slate-900/30 text-[9px] opacity-70"><th>Info</th><th>Size</th><th>Ref Targets</th>${getTh('Nodes', 'Nodes', '110px')}<th>N/HC</th>${getTh('Traffic', 'Total_Traffic', '100px')}<th>T/HC</th>${getTh('Purchase', 'Total_Purchase', '100px')}<th>P/HC</th><th colspan="2">漏斗追蹤 (龍頭:Head / 龍尾:Tail)</th></tr></thead><tbody>`;
                data.forEach(d => {
                    const hc = parseSheetNum(d.HC);
                    h += `<tr class="hover:bg-white/[0.03] transition-colors"><td class="p-2 font-black text-slate-100 text-sm uppercase italic text-left pl-4">${d.Floor}</td><td class="font-black text-2xl text-center">${hc || '-'}</td><td><div class="flex flex-col text-[11px] font-black items-center"><span class="text-sky-400">A:${d.ACB_Ref||0}</span><span class="text-indigo-400">I:${d.ICB_Ref||0}</span></div></td><td class="font-black text-2xl text-center">${parseSheetNum(d.Nodes).toLocaleString()}</td><td class="text-sky-300 font-black text-2xl text-center">${hc>0?(parseSheetNum(d.Nodes)/hc).toFixed(1):'-'}</td><td><div class="flex flex-col text-xs font-black items-center"><span class="text-white">${d.Traffic_Head||0}</span><span class="text-emerald-400">${d.Traffic_Tail||0}</span></div></td><td class="text-emerald-400 font-black text-3xl text-center">${hc>0?((parseSheetNum(d.Traffic_Head)+parseSheetNum(d.Traffic_Tail))/hc).toFixed(1):'-'}</td><td><div class="flex flex-col text-xs font-black items-center"><span class="text-white">${d.Purchase_Head||0}</span><span class="text-rose-400">${d.Purchase_Tail||0}</span></div></td><td class="text-rose-400 font-black text-3xl text-center">${hc>0?((parseSheetNum(d.Purchase_Head)+parseSheetNum(d.Purchase_Tail))/hc).toFixed(1):'-'}</td><td>${renderTableLeadCell(d, 'PT', brand, d.Floor, null, opsPTFilter)}</td><td>${renderTableLeadCell(d, 'Bday', brand, d.Floor)}</td></tr>`;
                });
                container.innerHTML += h + `</tbody></table></div></div></div>`;
            });
        }

        function renderTherapists(tData) {
            const container = document.getElementById('therapist-container');
            const bF = document.getElementById('t-brand-filter-container');
            const fF = document.getElementById('floor-filter-container');
            const ptF = document.getElementById('t-pt-filter-container');
            if (!tData || tData.length === 0) { container.innerHTML = `<div class="p-16 text-center glass-panel italic">Offline...</div>`; return; }
            const brands = [...new Set(tData.map(d => d.Brand))].filter(Boolean);
            if (!therapistFilterBrand || !brands.includes(therapistFilterBrand)) { therapistFilterBrand = brands[0]; }
            bF.innerHTML = brands.map(b => `<button onclick="setTherapistBrand('${b}')" class="filter-tab px-4 py-1.5 rounded-lg text-[10px] font-black uppercase ${therapistFilterBrand === b ? 'active' : ''}">${b}</button>`).join('');
            const bFloors = [...new Set(tData.filter(t => t.Brand === therapistFilterBrand).map(t => t.Floor))].sort();
            if (!therapistFilterFloor || !['All', ...bFloors].includes(therapistFilterFloor)) { therapistFilterFloor = bFloors[0] || 'All'; }
            fF.innerHTML = ['All', ...bFloors].map(f => `<button onclick="setTherapistFloor('${f}')" class="filter-tab px-4 py-1 rounded-full border border-white/5 text-[10px] font-black uppercase ${f === therapistFilterFloor ? 'active' : ''}">${f}</button>`).join('');
            
            ptF.innerHTML = ['Overall', 'PN', 'BBL', 'Pexo'].map(f => `<button onclick="setTherapistPTFilter('${f}')" class="filter-tab px-4 py-1.5 rounded-lg text-[10px] font-black uppercase ${therapistPTFilter === f ? 'active' : ''}">${f}</button>`).join('');
            
            let data = getSortData(tData.filter(t => t.Brand === therapistFilterBrand && (therapistFilterFloor === 'All' || t.Floor === therapistFilterFloor)), therapistSort);
            const color = colors[therapistFilterBrand?.toLowerCase()] || colors.default;
            const getTh = (l, k, w, ex = '') => `<th class="sort-header ${therapistSort.key === k ? 'sort-active' : ''} ${ex}" style="width: ${w};" onclick="handleSort('therapist', '${k}')">${l}${getSortIcon(therapistSort.key, k, therapistSort.direction)}</th>`;
            container.innerHTML = `<div class="glass-panel border-l-8 border-${color}-500 overflow-hidden shadow-2xl"><div class="bg-white/5 px-5 py-3 flex justify-between items-center border-b border-white/10"><span class="text-lg font-black uppercase italic text-${color}-300">${therapistFilterBrand} THERAPIST 個人表現</span><span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">${data.length} Units Online</span></div><div class="overflow-x-auto"><table class="w-full text-left kpi-table min-w-[1600px] table-fixed"><thead><tr class="bg-slate-900/40">${getTh('身份 Identity', 'Therapist', '220px', 'text-left pl-6')}${getTh(labels.nodes+' (Δ)', 'Nodes', '150px')}${getTh(labels.traffic+' [H/T]', 'Total_Traffic', '180px')}${getTh(labels.purchase+' [H/T]', 'Total_Purchase', '180px')}<th class="w-[450px]">${labels.pt_track}</th><th class="w-[550px]">${labels.bday_track}</th></tr></thead><tbody>` + data.map(t => `<tr class="hover:bg-white/[0.03] transition-colors"><td class="p-2 pl-6 font-black text-slate-100 text-lg uppercase italic text-left">${t.Therapist || t.Identity}</td><td class="font-black text-3xl text-center">${parseSheetNum(t.Nodes).toLocaleString()} ${getBracketHtml(t.Nodes_Delta)}</td><td><div class="flex justify-around text-sm font-black text-center"><span class="text-white">H:${t.Traffic_Head||0}</span><span class="text-emerald-400">T:${t.Traffic_Tail||0}</span></div></td><td><div class="flex justify-around text-sm font-black text-center"><span class="text-white">H:${t.Purchase_Head||0}</span><span class="text-rose-400">T:${t.Purchase_Tail||0}</span></div></td><td class="bg-indigo-500/[0.02]">${renderTableLeadCell(t, 'PT', therapistFilterBrand, t.Floor, t.Therapist, therapistPTFilter)}</td><td class="bg-violet-500/[0.02]">${renderTableLeadCell(t, 'Bday', therapistFilterBrand, t.Floor, t.Therapist)}</td></tr>`).join('') + `</tbody></table></div></div>`;
        }

        window.onload = () => { if (window.initDashboard) window.initDashboard(); setInterval(() => { const tE = document.getElementById('current-time'); if (tE) tE.innerText = new Date().toLocaleString(); }, 1000); };
    </script>
</body>
</html>
